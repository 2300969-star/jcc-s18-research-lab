ont-size="14" fill="#667085" font-weight="600" text-anchor="start" >稳健度 R</text><rect x="974" y="593" width="126" height="32" rx="16" fill="#f2f4f7" stroke="none" stroke-width="1"/><text x="1037" y="615" font-size="15" fill="#667085" font-weight="650" text-anchor="middle" >圆点=失速率</text><rect x="52" y="598" width="840" height="32" rx="6" fill="#ecfdf3" stroke="#a7f3d0" stroke-width="1"/><text x="472" y="620" font-size="14" fill="#059669" font-weight="650" text-anchor="middle" >R = 40%×前25%率 + 20%×前5率 + 25%×(1−失速率) + 15%×尾部下限</text>
