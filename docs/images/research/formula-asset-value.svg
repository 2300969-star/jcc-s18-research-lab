  <style>text{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;letter-spacing:0}</style>
  <text x="52" y="58" font-size="30" fill="#172033" font-weight="750" text-anchor="start" >公式 01 · 资产角色价值模型</text>
  <text x="52" y="88" font-size="16" fill="#667085" font-weight="400" text-anchor="start" >从“清单命中”改为主C、装备、前排、功能位与概率折现的结构化估值</text>
  <line x1="52" y1="108" x2="1148" y2="108" stroke="#e4e7ec" stroke-width="1" />
  <rect x="52" y="132" width="1096" height="98" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/><text x="600" y="173" font-size="22" fill="#2563eb" font-weight="700" text-anchor="middle" >V(route | hand, level) = Σ held-role value + Σ future value × P(hit) + Baugment + Bprior</text><text x="600" y="207" font-size="16" fill="#667085" font-weight="450" text-anchor="middle" >阶段感不靠人工乘数，而由商店可见概率与未持有需求的折现自然产生</text><text x="52" y="272" font-size="20" fill="#172033" font-weight="700" text-anchor="start" >角色基础权重</text><text x="52" y="325" font-size="16" fill="#172033" font-weight="600" text-anchor="start" >主C本体</text><rect x="172" y="302" width="450" height="30" rx="5" fill="#eef2f6" stroke="none" stroke-width="1"/><rect x="172" y="302" width="450" height="30" rx="5" fill="#2563eb" stroke="none" stroke-width="1"/><text x="635" y="324" font-size="16" fill="#2563eb" font-weight="700" text-anchor="start" >60 分</text><text x="52" y="374" font-size="16" fill="#172033" font-weight="600" text-anchor="start" >主C成装</text><rect x="172" y="351" width="450" height="30" rx="5" fill="#eef2f6" stroke="none" stroke-width="1"/><rect x="172" y="351" width="225" height="30" rx="5" fill="#7c3aed" stroke="none" stroke-width="1"/><text x="635" y="373" font-size="16" fill="#7c3aed" font-weight="700" text-anchor="start" >30 分</text><text x="52" y="423" font-size="16" fill="#172033" font-weight="600" text-anchor="start" >副C本体</text><rect x="172" y="400" width="450" height="30" rx="5" fill="#eef2f6" stroke="none" stroke-width="1"/><rect x="172" y="400" width="180" height="30" rx="5" fill="#0891b2" stroke="none" stroke-width="1"/><text x="635" y="422" font-size="16" fill="#0891b2" font-weight="700" text-anchor="start" >24 分</text><text x="52" y="472" font-size="16" fill="#172033" font-weight="600" text-anchor="start" >前排本体</text><rect x="172" y="449" width="450" height="30" rx="5" fill="#eef2f6" stroke="none" stroke-width="1"/><rect x="172" y="449" width="120" height="30" rx="5" fill="#059669" stroke="none" stroke-width="1"/><text x="635" y="471" font-size="16" fill="#059669" font-weight="700" text-anchor="start" >16 分</text><text x="52" y="521" font-size="16" fill="#172033" font-weight="600" text-anchor="start" >功能棋子</text><rect x="172" y="498" width="450" height="30" rx="5" fill="#eef2f6" stroke="none" stroke-width="1"/><rect x="172" y="498" width="75" height="30" rx="5" fill="#d97706" stroke="none" stroke-width="1"/><text x="635" y="520" font-size="16" fill="#d97706" font-weight="700" text-anchor="start" >10 分</text><text x="52" y="570" font-size="16" fill="#172033" font-weight="600" text-anchor="start" >羁绊亲和</text><rect x="172" y="547" width="450" height="30" rx="5" fill="#eef2f6" stroke="none" stroke-width="1"/><rect x="172" y="547" width="52.5" height="30" rx="5" fill="#dc2626" stroke="none" stroke-width="1"/><text x="635" y="569" font-size="16" fill="#dc2626" font-weight="700" text-anchor="start" >7 分</text><rect x="720" y="270" width="428" height="282" rx="10" fill="#f8fafc" stroke="#e4e7ec" stroke-width="1"/><text x="748" y="309" font-size="20" fill="#172033" font-weight="700" text-anchor="start" >组合算子</text><rect x="748" y="332" width="124" height="32" rx="16" fill="#2563eb" stroke="none" stroke-width="1"/><text x="810" y="354" font-size="15" fill="#fff" font-weight="650" text-anchor="middle" >2星 ×1.5</text><rect x="884" y="332" width="124" height="32" rx="16" fill="#7c3aed" stroke="none" stroke-width="1"/><text x="946" y="354" font-size="15" fill="#fff" font-weight="650" text-anchor="middle" >3星 ×2.5</text><rect x="1020" y="332" width="112" height="32" rx="16" fill="#059669" stroke="none" stroke-width="1"/><text x="1076" y="354" font-size="15" fill="#fff" font-weight="650" text-anchor="middle" >三星核心 +18</text><text x="748" y="407" font-size="16" fill="#172033" font-weight="500" text-anchor="start"><tspan x="748" dy="0">两散件可立即合成：成装价值 × 0.80</tspan><tspan x="748" dy="28">单散件属于目标装备：成装价值 × 0.50</tspan><tspan x="748" dy="28">认证先验：clamp((R - 50) / 10, -5, +5)</tspan><tspan x="748" dy="28">未来价值：需求价值 × P(hit | 等级、费用、牌池)</tspan></text><rect x="720" y="572" width="428" height="42" rx="7" fill="#ecfdf3" stroke="#a7f3d0" stroke-width="1"/><text x="934" y="599" font-size="16" fill="#059669" font-weight="700" text-anchor="middle" >同一资产因承担角色不同而价值不同</text>
