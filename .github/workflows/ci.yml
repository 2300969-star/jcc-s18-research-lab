name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  deterministic-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test
      - name: Syntax check
        run: find src public tools -name '*.js' -print0 | xargs -0 -n1 node --check
