<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<title>星神决策实验台 17.7</title>
<style>
:root {
  --bg:#f6f7f5; --surface:#ffffff; --ink:#11120f; --ink2:#4f524c; --muted:#81857d;
  --line:#dfe2db; --green:#087f5b; --green2:#dff3eb; --amber:#ad6800; --amber2:#fff1d6;
  --red:#b73838; --blue:#2869b1; --purple:#6750a4; --shadow:0 12px 34px rgba(18,24,20,.08);
}
:root[data-theme="dark"] {
  --bg:#0d100e; --surface:#151916; --ink:#f7f8f4; --ink2:#c7cbc3; --muted:#898f86;
  --line:#2b312c; --green:#34c28f; --green2:#142c22; --amber:#f1ad42; --amber2:#332714;
  --red:#f06a6a; --blue:#73a9ed; --purple:#a99be9; --shadow:0 16px 42px rgba(0,0,0,.22);
}
@media (prefers-color-scheme:dark) {
  :root:not([data-theme="light"]) {
    --bg:#0d100e; --surface:#151916; --ink:#f7f8f4; --ink2:#c7cbc3; --muted:#898f86;
    --line:#2b312c; --green:#34c28f; --green2:#142c22; --amber:#f1ad42; --amber2:#332714;
    --red:#f06a6a; --blue:#73a9ed; --purple:#a99be9; --shadow:0 16px 42px rgba(0,0,0,.22);
  }
}
* { box-sizing:border-box; }
body { margin:0; background:var(--bg); color:var(--ink); font:15px/1.5 system-ui,-apple-system,"Segoe UI",sans-serif; }
button,input,select { font:inherit; }
button { color:inherit; }
.app { max-width:1440px; margin:0 auto; padding:20px 24px 40px; }
.topbar { display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:18px; }
.brand { min-width:0; }
.brand h1 { margin:0; font-size:26px; line-height:1.2; }
.brand p { margin:5px 0 0; color:var(--muted); font-size:13px; }
.top-actions { display:flex; gap:8px; flex:none; }
.btn { min-height:42px; border:1px solid var(--line); border-radius:8px; background:var(--surface); padding:8px 14px; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; }
.btn:hover { border-color:var(--green); }
.btn.primary { background:var(--green); color:#fff; border-color:var(--green); font-weight:750; }
.workspace { display:grid; grid-template-columns:minmax(360px,.86fr) minmax(0,1.5fr); gap:18px; align-items:start; }
.surface { background:var(--surface); border:1px solid var(--line); border-radius:8px; box-shadow:var(--shadow); }
.control-panel { padding:18px; position:sticky; top:14px; }
.section-title { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:12px; }
.section-title h2 { margin:0; font-size:17px; }
.status { color:var(--muted); font-size:12px; }
.segment { display:flex; gap:6px; flex-wrap:wrap; }
.segment button { min-height:38px; min-width:64px; border:1px solid var(--line); border-radius:999px; background:transparent; cursor:pointer; }
.segment button.active { background:var(--ink); border-color:var(--ink); color:var(--bg); font-weight:800; }
.control-group { padding:14px 0; border-bottom:1px solid var(--line); }
.control-group:last-child { border-bottom:0; padding-bottom:0; }
.group-label { display:flex; justify-content:space-between; gap:12px; color:var(--ink2); font-size:13px; font-weight:700; margin-bottom:9px; }
.grid-fields { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; }
.field label { display:block; color:var(--muted); font-size:11px; margin-bottom:4px; }
.field input,.field select { width:100%; min-height:42px; border:1px solid var(--line); border-radius:7px; color:var(--ink); background:var(--bg); padding:8px 10px; }
.god-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; }
.god-btn { min-height:68px; border:1px solid var(--line); border-radius:8px; background:transparent; padding:7px; cursor:pointer; display:flex; align-items:center; gap:7px; text-align:left; min-width:0; }
.god-btn img { width:38px; height:38px; object-fit:cover; border-radius:50%; border:1px solid var(--line); }
.god-btn span { min-width:0; font-size:12px; font-weight:750; overflow-wrap:anywhere; }
.god-btn.active { border-color:var(--green); background:var(--green2); box-shadow:inset 0 0 0 1px var(--green); }
.god-btn:disabled { opacity:.45; cursor:not-allowed; }
.history { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; }
.history select { width:100%; min-height:40px; border:1px solid var(--line); border-radius:7px; background:var(--bg); color:var(--ink); padding:6px 8px; }
.main { min-width:0; }
.decision { padding:22px; border-left:5px solid var(--green); margin-bottom:18px; }
.decision-head { display:flex; justify-content:space-between; gap:20px; align-items:flex-start; }
.eyebrow { color:var(--green); font-size:12px; font-weight:850; margin-bottom:5px; }
.decision h2 { margin:0; font-size:31px; line-height:1.18; overflow-wrap:anywhere; }
.decision .desc { color:var(--ink2); margin:10px 0 0; max-width:860px; }
.score { flex:none; color:var(--green); font-size:42px; line-height:1; font-weight:900; font-variant-numeric:tabular-nums; }
.score small { display:block; color:var(--muted); font-size:11px; text-align:right; margin-top:6px; }
.dimension-grid { margin-top:18px; display:grid; grid-template-columns:repeat(6,minmax(0,1fr)); gap:8px; }
.dimension { border-top:3px solid var(--line); padding:8px 2px 0; min-width:0; }
.dimension.good { border-color:var(--green); }
.dimension.bad { border-color:var(--red); }
.dimension .label { color:var(--muted); font-size:11px; }
.dimension .value { font-size:18px; font-weight:850; font-variant-numeric:tabular-nums; }
.notes { margin-top:15px; display:flex; flex-wrap:wrap; gap:7px; }
.note { border:1px solid var(--line); border-radius:999px; padding:4px 9px; color:var(--ink2); font-size:12px; background:var(--bg); }
.decision-actions { margin-top:16px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.main-god { color:var(--purple); font-weight:750; font-size:13px; }
.sensitivity { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; margin-bottom:18px; }
.sensitivity-item { padding:14px 15px; background:var(--surface); border:1px solid var(--line); border-radius:8px; }
.sensitivity-item .label { color:var(--muted); font-size:11px; }
.sensitivity-item strong { display:block; margin-top:4px; font-size:15px; }
.delta { float:right; font-variant-numeric:tabular-nums; color:var(--green); }
.delta.down { color:var(--red); }
.section-band { margin:22px 0 10px; display:flex; justify-content:space-between; align-items:end; gap:12px; }
.section-band h2 { margin:0; font-size:18px; }
.section-band p { margin:0; color:var(--muted); font-size:12px; }
.candidates { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }
.candidate { background:var(--surface); border:1px solid var(--line); border-radius:8px; padding:16px; min-width:0; }
.candidate.best { border-color:var(--green); }
.candidate-head { display:flex; align-items:center; gap:10px; }
.candidate-head img { width:42px; height:42px; border-radius:50%; object-fit:cover; border:1px solid var(--line); }
.candidate-title { min-width:0; flex:1; }
.candidate-title b { display:block; overflow-wrap:anywhere; }
.candidate-title span { color:var(--muted); font-size:11px; }
.candidate-score { font-size:24px; font-weight:900; color:var(--green); font-variant-numeric:tabular-nums; }
.bar { margin-top:13px; height:8px; background:var(--line); border-radius:4px; overflow:hidden; }
.bar span { display:block; height:100%; background:var(--green); }
.mini-parts { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; color:var(--ink2); font-size:11px; }
.candidate p { margin:10px 0 0; color:var(--ink2); font-size:12px; min-height:36px; }
.coverage { margin-top:10px; color:var(--muted); font-size:11px; }
.research { margin-top:18px; display:grid; grid-template-columns:minmax(0,1.2fr) minmax(260px,.8fr); gap:14px; }
.research > section { padding:17px; }
.research h2 { margin:0 0 12px; font-size:16px; }
.god-row { display:grid; grid-template-columns:94px minmax(0,1fr) 56px; gap:10px; align-items:center; margin:9px 0; font-size:12px; }
.god-row .track { height:7px; border-radius:4px; background:var(--line); overflow:hidden; }
.god-row .track span { display:block; height:100%; background:var(--purple); }
.god-row .number { text-align:right; color:var(--ink2); }
.limits { margin:0; padding-left:18px; color:var(--ink2); font-size:12px; }
.limits li { margin-bottom:7px; }
.empty { padding:44px 20px; text-align:center; color:var(--muted); border:1px dashed var(--line); border-radius:8px; }
@media (max-width:1050px) {
  .workspace { grid-template-columns:1fr; }
  .control-panel { position:static; }
  .dimension-grid { grid-template-columns:repeat(3,minmax(0,1fr)); }
}
@media (max-width:720px) {
  .app { padding:14px 12px 30px; }
  .topbar { align-items:flex-start; }
  .brand h1 { font-size:21px; }
  .top-actions .btn:first-child { display:none; }
  .god-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
  .decision { padding:17px; }
  .decision h2 { font-size:25px; }
  .score { font-size:32px; }
  .candidates,.research,.sensitivity { grid-template-columns:1fr; }
  .dimension-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
}
</style>
</head>
<body>
<main class="app">
  <header class="topbar">
    <div class="brand">
      <h1>星神决策实验台</h1>
      <p>17.7独立规则集 · 9位星神 · 110个唯一赐福 · 确定性状态价值模型</p>
    </div>
    <div class="top-actions">
      <a class="btn" href="index.html">返回研究面板</a>
      <button class="btn" id="themeBtn" type="button">切换明暗</button>
    </div>
  </header>

  <div class="workspace">
    <aside class="surface control-panel">
      <div class="section-title">
        <h2>这回合的真实状态</h2>
        <span class="status" id="sourceStatus">载入数据中</span>
      </div>

      <section class="control-group">
        <div class="group-label"><span>选择轮次</span><span id="roundLabel">2-4</span></div>
        <div class="segment" id="stageSegment">
          <button type="button" data-stage="2" class="active">2-4</button>
          <button type="button" data-stage="3">3-4</button>
          <button type="button" data-stage="4">4-4</button>
        </div>
      </section>

      <section class="control-group">
        <div class="group-label"><span>状态变量</span><span>改动即重算</span></div>
        <div class="grid-fields">
          <div class="field"><label for="hp">生命值</label><input id="hp" type="number" min="1" max="100" value="72"></div>
          <div class="field"><label for="gold">金币</label><input id="gold" type="number" min="0" max="100" value="32"></div>
          <div class="field"><label for="level">等级</label><input id="level" type="number" min="3" max="10" value="6"></div>
          <div class="field"><label for="streak">连胜/连败</label><input id="streak" type="number" min="-8" max="8" value="0"></div>
          <div class="field"><label for="direction">阵容方向</label>
            <select id="direction">
              <option value="flexible">还没定</option>
              <option value="physical">物理输出</option>
              <option value="magic">法系输出</option>
              <option value="tank">前排止血</option>
              <option value="economy">经济升级</option>
              <option value="highCost">高费上限</option>
            </select>
          </div>
          <div class="field"><label for="shared">预计共选人数</label><input id="shared" type="number" min="1" max="8" value="1"></div>
          <div class="field"><label for="traits">当前非唯一羁绊</label><input id="traits" type="number" min="0" max="12" value="4"></div>
          <div class="field"><label for="refreshes">已刷新次数</label><input id="refreshes" type="number" min="0" max="30" value="0"></div>
        </div>
      </section>

      <section class="control-group">
        <div class="group-label"><span>本轮实际出现的星神</span><span id="offerCount">未限定</span></div>
        <div class="god-grid" id="godGrid"></div>
      </section>

      <section class="control-group">
        <div class="group-label"><span>历史选择</span><button class="btn" id="clearHistory" type="button">清空</button></div>
        <div class="history">
          <select id="history2" aria-label="2-4选择"></select>
          <select id="history3" aria-label="3-4选择"></select>
          <select id="history4" aria-label="4-4选择"></select>
        </div>
      </section>
    </aside>

    <section class="main">
      <article class="surface decision" id="decision"></article>
      <div class="sensitivity" id="sensitivity"></div>

      <div class="section-band">
        <div>
          <h2>同场候选</h2>
          <p>只对本轮实际出现的星神比较；未点选时显示全池研究排序</p>
        </div>
        <p id="candidateCount"></p>
      </div>
      <div class="candidates" id="candidates"></div>

      <div class="research">
        <section class="surface">
          <h2>5400状态虚拟实验</h2>
          <div id="godDistribution"></div>
        </section>
        <section class="surface">
          <h2>尚未自证</h2>
          <ul class="limits" id="limitations"></ul>
        </section>
      </div>
    </section>
  </div>
</main>

<script src="star-god-data.js"></script>
<script src="star-god-results-data.js"></script>
<script src="star-god-core.js"></script>
<script>
(function () {
  "use strict";
  const data = window.STAR_GOD_DATA;
  const results = window.STAR_GOD_RESULTS;
  const Core = window.StarGodCore;
  const STORAGE = "jcc-star-god-state";
  const $ = id => document.getElementById(id);
  const fields = ["hp", "gold", "level", "streak", "direction", "shared", "traits", "refreshes"];
  const selectedGods = new Set();

  function safeState() {
    let stored = {};
    try { stored = JSON.parse(localStorage.getItem(STORAGE) || "{}"); } catch (_) {}
    return {
      stage: Number(stored.stage || 2),
      history: stored.history || { 2: "", 3: "", 4: "" },
      values: stored.values || {},
    };
  }

  const uiState = safeState();

  function persist() {
    uiState.values = Object.fromEntries(fields.map(id => [id, $(id).value]));
    localStorage.setItem(STORAGE, JSON.stringify({
      stage: uiState.stage,
      history: uiState.history,
      values: uiState.values,
    }));
  }

  function currentState(overrides) {
    const history = Object.entries(uiState.history).filter(([, godId]) => godId).map(([stage, godId]) => ({ stage: Number(stage), godId: Number(godId) }));
    return Core.createState({
      stage: uiState.stage,
      round: `${uiState.stage}-4`,
      hp: Number($("hp").value),
      gold: Number($("gold").value),
      level: Number($("level").value),
      streak: Number($("streak").value),
      componentDirection: $("direction").value,
      sharedChoiceCount: Number($("shared").value),
      distinctTraits: Number($("traits").value),
      refreshCount: Number($("refreshes").value),
      expectedRounds: uiState.stage === 2 ? 13 : uiState.stage === 3 ? 9 : 6,
      godHistory: history,
      currentMainGod: Core.deriveMainGod(history),
      ...overrides,
    });
  }

  function icon(godId) {
    return `assets/star-god/${godId}.png`;
  }

  function initializeControls() {
    for (const id of fields) if (uiState.values[id] != null) $(id).value = uiState.values[id];
    $("stageSegment").querySelectorAll("button").forEach(button => {
      button.classList.toggle("active", Number(button.dataset.stage) === uiState.stage);
    });
    $("roundLabel").textContent = `${uiState.stage}-4`;
  }

  function renderGods() {
    $("godGrid").innerHTML = data.gods.map(god => `
      <button class="god-btn ${selectedGods.has(god.id) ? "active" : ""}" data-id="${god.id}" type="button">
        <img src="${icon(god.id)}" alt="">
        <span>${god.name}</span>
      </button>
    `).join("");
    $("godGrid").querySelectorAll("button").forEach(button => button.addEventListener("click", () => {
      const id = Number(button.dataset.id);
      if (selectedGods.has(id)) selectedGods.delete(id);
      else if (selectedGods.size < 3) selectedGods.add(id);
      render();
    }));
    $("offerCount").textContent = selectedGods.size ? `已选${selectedGods.size}/3` : "未限定";
  }

  function renderHistory() {
    const options = `<option value="">未选择</option>${data.gods.map(god => `<option value="${god.id}">${god.name}</option>`).join("")}`;
    [2, 3, 4].forEach(stage => {
      const select = $(`history${stage}`);
      select.innerHTML = options;
      select.value = uiState.history[stage] || "";
      select.disabled = stage > uiState.stage;
      select.title = `${stage}-4历史选择`;
      select.onchange = () => {
        uiState.history[stage] = select.value;
        persist();
        render();
      };
    });
  }

  function partsMarkup(row) {
    const parts = [
      ["战斗", row.parts.combat, "good"],
      ["经济", row.parts.economy, "good"],
      ["灵活", row.parts.flexibility, "good"],
      ["延迟", row.parts.delay, ""],
      ["风险", -row.parts.risk, "bad"],
      ["承诺", -row.parts.commitment, "bad"],
    ];
    return parts.map(([label, value, tone]) => `
      <div class="dimension ${tone}">
        <div class="label">${label}</div>
        <div class="value">${value > 0 ? "+" : ""}${value}</div>
      </div>
    `).join("");
  }

  function decisionText(row, state) {
    if (!row) return "";
    const action = row.godName === "奥瑞利安·索尔" ? "确认任务能在两阶段内兑现再拿"
      : row.godName === "艾克" ? "先核对血量能否活过延迟回合"
        : row.godName === "伊芙琳" ? "支付生命后仍高于止损线才拿"
          : row.godName === "凯尔" ? `按${Core.DIRECTION_LABELS[state.componentDirection]}方向拿装备`
            : row.godName === "阿狸" ? "先数同场共选人数再锁定"
              : row.godName === "亚索" ? "把永久格给当前最稳定的核心位"
                : row.godName === "韦鲁斯" ? "对照已有费用与追星目标拿牌"
                  : row.godName === "索拉卡" ? "低血量优先兑现容错"
                    : "随机收益按保守下界选择";
    return action;
  }

  function renderDecision(rankings, state) {
    const top = rankings[0];
    if (!top) {
      $("decision").innerHTML = `<div class="empty">当前条件没有可用赐福，请检查轮次或星神选择。</div>`;
      return;
    }
    const second = rankings[1];
    const mainGod = data.gods.find(god => god.id === state.currentMainGod);
    const mainProjection = Core.mainGodProjection(data.blessings, state);
    $("decision").innerHTML = `
      <div class="decision-head">
        <div>
          <div class="eyebrow">此刻优先 · ${top.godName}${top.mainGod ? "主神恩赐" : ""}</div>
          <h2>${top.name}</h2>
          <p class="desc">${decisionText(top, state)}。${top.description}</p>
        </div>
        <div class="score">${top.total}<small>${second ? `领先${Core.round(top.total - second.total)}分` : "唯一候选"}</small></div>
      </div>
      <div class="dimension-grid">${partsMarkup(top)}</div>
      <div class="notes">${top.notes.map(note => `<span class="note">${note}</span>`).join("") || `<span class="note">按通用价值模型估计</span>`}</div>
      <div class="decision-actions">
        <button class="btn primary" id="recordChoice" type="button">记为${uiState.stage}-4已选</button>
        <span class="main-god">${mainGod ? `4-7主神收益：${mainGod.name} · ${mainProjection ? `${mainProjection.name}（模型值${mainProjection.total}）` : "待确认"}` : "重复选择同一星神后，4-7形成主神路线"}</span>
      </div>
    `;
    $("recordChoice").onclick = () => {
      uiState.history[uiState.stage] = String(top.godId);
      persist();
      render();
    };
  }

  function renderSensitivity(top, state) {
    if (!top) { $("sensitivity").innerHTML = ""; return; }
    const blessing = data.blessings.find(row => row.id === top.blessingId && row.stage === top.stage);
    const variants = [
      ["生命-20", { hp: Math.max(1, state.hp - 20) }],
      ["金币+20", { gold: state.gold + 20 }],
      ["共选5人", { sharedChoiceCount: 5 }],
    ];
    $("sensitivity").innerHTML = variants.map(([label, change]) => {
      const value = Core.evaluateBlessing(blessing, { ...state, ...change }).total;
      const delta = Core.round(value - top.total);
      return `<div class="sensitivity-item"><span class="label">${label}</span><span class="delta ${delta < 0 ? "down" : ""}">${delta >= 0 ? "+" : ""}${delta}</span><strong>${value}分</strong></div>`;
    }).join("");
  }

  function renderCandidates(rankings) {
    const shown = rankings.slice(0, 8);
    const max = Math.max(1, ...shown.map(row => row.total));
    $("candidateCount").textContent = `显示${shown.length}/${rankings.length}`;
    $("candidates").innerHTML = shown.map((row, index) => `
      <article class="candidate ${index === 0 ? "best" : ""}">
        <div class="candidate-head">
          <img src="${icon(row.godId)}" alt="">
          <div class="candidate-title"><b>#${index + 1} ${row.godName} · ${row.name}</b><span>${row.mainGod ? "主神恩赐" : `第${row.stage}轮赐福`}</span></div>
          <div class="candidate-score">${row.total}</div>
        </div>
        <div class="bar"><span style="width:${Math.max(2, row.total / max * 100)}%"></span></div>
        <div class="mini-parts"><span>战斗${row.parts.combat}</span><span>经济${row.parts.economy}</span><span>灵活${row.parts.flexibility}</span><span>风险-${Core.round(row.parts.risk + row.parts.commitment)}</span></div>
        <p>${row.notes.join("；") || row.description}</p>
        <div class="coverage">${row.coverage === "modeled" ? "确定性算子已覆盖" : "部分覆盖，按保守值"}</div>
      </article>
    `).join("");
  }

  function renderResearch() {
    const max = Math.max(...results.byGod.map(row => row.mean));
    $("godDistribution").innerHTML = results.byGod.map(row => `
      <div class="god-row">
        <span>${row.name}</span>
        <div class="track"><span style="width:${row.mean / max * 100}%"></span></div>
        <span class="number">${row.mean}</span>
      </div>
    `).join("");
    $("limitations").innerHTML = results.limitations.map(text => `<li>${text}</li>`).join("");
  }

  function render() {
    persist();
    initializeControls();
    renderGods();
    renderHistory();
    const state = currentState();
    const rankings = Core.rankBlessings(data.blessings, state, [...selectedGods]);
    renderDecision(rankings, state);
    renderSensitivity(rankings[0], state);
    renderCandidates(rankings);
    renderResearch();
    $("sourceStatus").textContent = `${data.summary.uniqueBlessings}赐福 · ${results.samples}状态`;
  }

  fields.forEach(id => $(id).addEventListener("input", render));
  $("stageSegment").querySelectorAll("button").forEach(button => button.addEventListener("click", () => {
    uiState.stage = Number(button.dataset.stage);
    selectedGods.clear();
    render();
  }));
  $("clearHistory").addEventListener("click", () => {
    uiState.history = { 2: "", 3: "", 4: "" };
    persist();
    render();
  });
  $("themeBtn").addEventListener("click", () => {
    const root = document.documentElement;
    root.dataset.theme = root.dataset.theme === "dark" ? "light" : "dark";
  });

  if (!data || !results || !Core) throw new Error("星神数据或模型未载入");
  render();
})();
</script>
</body>
</html>
