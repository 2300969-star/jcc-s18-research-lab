<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<title>怪兽入侵 S18 · 数值与 Bug 审计</title>
<style>
:root {
  --plane:#f7f7f4; --surface:#ffffff; --ink:#101112; --ink2:#51565b; --muted:#8a8f95;
  --line:#deded6; --border:rgba(16,17,18,.12); --p1:#d63b3b; --p2:#c88411; --p3:#3577d4;
  --ok:#13855c; --violet:#7357d6; --cyan:#0d7e9d; --row:#fbfbf9; --shadow:rgba(0,0,0,.07);
}
:root[data-theme="dark"] {
  --plane:#0d0e0f; --surface:#181a1c; --ink:#f5f5f2; --ink2:#c5c8ca; --muted:#8f9499;
  --line:#2b2e31; --border:rgba(255,255,255,.11); --p1:#ef5a5a; --p2:#e0a02d; --p3:#5a97ee;
  --ok:#25a875; --violet:#9a8bf0; --cyan:#2da7c7; --row:#121416; --shadow:rgba(0,0,0,.28);
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --plane:#0d0e0f; --surface:#181a1c; --ink:#f5f5f2; --ink2:#c5c8ca; --muted:#8f9499;
    --line:#2b2e31; --border:rgba(255,255,255,.11); --p1:#ef5a5a; --p2:#e0a02d; --p3:#5a97ee;
    --ok:#25a875; --violet:#9a8bf0; --cyan:#2da7c7; --row:#121416; --shadow:rgba(0,0,0,.28);
  }
}
* { box-sizing:border-box; margin:0; }
body { background:var(--plane); color:var(--ink); font:14px/1.55 system-ui,-apple-system,"Segoe UI",sans-serif; padding:24px 18px 72px; }
.wrap { max-width:1180px; margin:0 auto; }
header { display:flex; justify-content:space-between; align-items:flex-start; gap:14px; flex-wrap:wrap; margin-bottom:10px; }
h1 { font-size:22px; font-weight:700; letter-spacing:0; }
h2 { font-size:15px; font-weight:680; margin-bottom:10px; }
.sub { color:var(--ink2); font-size:12.5px; margin-top:4px; }
.actions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
button, input, select { font:inherit; color:var(--ink); }
button { border:1px solid var(--border); background:var(--surface); border-radius:8px; padding:6px 11px; cursor:pointer; }
button:hover { border-color:var(--p3); color:var(--p3); }
.theme { color:var(--ink2); font-size:12px; padding:5px 10px; }
.tabs { position:sticky; top:0; z-index:4; background:var(--plane); border-bottom:1px solid var(--line); padding:9px 0 10px; display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
.tab { border-radius:999px; padding:5px 13px; color:var(--ink2); font-size:12.5px; }
.tab.active { color:#fff; background:var(--p3); border-color:var(--p3); }
.filters { display:grid; grid-template-columns: minmax(220px,1fr) 140px 150px 92px; gap:10px; margin-bottom:14px; }
input, select { width:100%; border:1px solid var(--border); background:var(--surface); border-radius:8px; padding:8px 10px; outline:none; }
input:focus, select:focus { border-color:var(--p3); box-shadow:0 0 0 3px color-mix(in srgb, var(--p3) 18%, transparent); }
.tiles { display:grid; grid-template-columns:repeat(6,minmax(0,1fr)); gap:10px; margin:12px 0 16px; }
.tile { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px 13px; min-height:86px; box-shadow:0 8px 24px var(--shadow); }
.tile .lb { color:var(--ink2); font-size:12px; min-height:19px; }
.tile .v { font-size:27px; font-weight:720; font-variant-numeric:tabular-nums; margin-top:5px; }
.tile .d { color:var(--muted); font-size:11.5px; }
.layout { display:grid; grid-template-columns: 1fr 330px; gap:14px; align-items:start; }
.main, .side { min-width:0; }
.section { display:none; }
.section.active { display:block; }
.panel { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:14px 16px; margin-bottom:14px; box-shadow:0 8px 24px var(--shadow); }
.side .panel { position:sticky; top:58px; }
.queue { display:flex; flex-direction:column; gap:8px; }
.qitem { border:1px solid var(--border); background:var(--row); border-radius:8px; padding:9px 10px; cursor:pointer; }
.qitem:hover { border-color:var(--p3); }
.qtop { display:flex; gap:8px; align-items:center; margin-bottom:2px; }
.qtitle { font-weight:650; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.qmeta { color:var(--muted); font-size:12px; }
.sev { display:inline-flex; align-items:center; justify-content:center; width:30px; height:22px; border-radius:6px; color:#fff; font-size:11px; font-weight:720; flex:0 0 auto; }
.sev.P1 { background:var(--p1); }
.sev.P2 { background:var(--p2); }
.sev.P3 { background:var(--p3); }
.pill { display:inline-flex; align-items:center; height:22px; border:1px solid var(--border); border-radius:999px; padding:0 8px; color:var(--ink2); font-size:11.5px; white-space:nowrap; }
.pill.good { color:var(--ok); border-color:color-mix(in srgb, var(--ok) 38%, var(--border)); }
.pill.warn { color:var(--p2); border-color:color-mix(in srgb, var(--p2) 42%, var(--border)); }
.pill.hot { color:var(--p1); border-color:color-mix(in srgb, var(--p1) 42%, var(--border)); }
.grid2 { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }
.mini { padding:12px; background:var(--row); border:1px solid var(--border); border-radius:8px; min-height:132px; }
.mini h3 { font-size:13px; margin-bottom:7px; }
.bar { display:grid; grid-template-columns:86px 1fr 50px; gap:8px; align-items:center; margin:7px 0; font-size:12px; }
.bar .nm { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--ink2); }
.track { height:7px; border-radius:999px; background:color-mix(in srgb, var(--p3) 18%, transparent); overflow:hidden; }
.fill { height:100%; border-radius:999px; background:var(--p3); }
.bar .val { color:var(--muted); text-align:right; font-variant-numeric:tabular-nums; }
table { width:100%; border-collapse:collapse; table-layout:fixed; font-size:12.5px; }
th, td { border-bottom:1px solid var(--line); padding:8px 8px 8px 0; text-align:left; vertical-align:top; }
th { color:var(--ink2); font-weight:650; position:sticky; top:48px; background:var(--surface); z-index:2; }
td { color:var(--ink); overflow:hidden; text-overflow:ellipsis; }
tr.clickable { cursor:pointer; }
tr.clickable:hover td { background:color-mix(in srgb, var(--p3) 8%, transparent); }
.num { font-variant-numeric:tabular-nums; text-align:right; }
.muted { color:var(--muted); }
.tags { display:flex; gap:5px; flex-wrap:wrap; }
.problem { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; color:var(--ink2); }
.empty { color:var(--muted); padding:24px 0; text-align:center; border:1px dashed var(--border); border-radius:8px; }
.detailTitle { font-size:14px; font-weight:700; margin-bottom:6px; }
.detailMeta { color:var(--muted); font-size:12px; margin-bottom:10px; }
.detailBody { display:flex; flex-direction:column; gap:7px; }
.kv { display:grid; grid-template-columns:86px 1fr; gap:8px; font-size:12.5px; }
.kv b { color:var(--ink2); font-weight:620; }
pre { white-space:pre-wrap; word-break:break-word; background:var(--row); border:1px solid var(--border); border-radius:8px; padding:10px; color:var(--ink2); max-height:300px; overflow:auto; font-size:12px; }
.foot { color:var(--muted); font-size:12px; margin-top:12px; }
@media (max-width: 980px) {
  .tiles { grid-template-columns:repeat(3,minmax(0,1fr)); }
  .layout { grid-template-columns:1fr; }
  .side .panel { position:static; }
}
@media (max-width: 720px) {
  body { padding:18px 12px 56px; }
  .filters { grid-template-columns:1fr; }
  .tiles { grid-template-columns:repeat(2,minmax(0,1fr)); }
  .grid2 { grid-template-columns:1fr; }
  table { table-layout:auto; min-width:760px; }
  .tableScroll { overflow-x:auto; }
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>怪兽入侵 S18 · 数值与 Bug 审计</h1>
      <div class="sub" id="subline"></div>
    </div>
    <div class="actions">
      <button class="theme" id="themeBtn">切换明暗</button>
      <button class="theme" id="modelBtn">模型仪表盘</button>
      <button class="theme" id="reportBtn">审计报告</button>
    </div>
  </header>

  <nav class="tabs" id="tabs"></nav>

  <div class="filters">
    <input id="search" placeholder="搜索阵容、英雄、装备、技能、问题摘要">
    <select id="severity">
      <option value="all">全部级别</option>
      <option value="P1">只看 P1</option>
      <option value="P2">只看 P2</option>
      <option value="P3">只看 P3</option>
    </select>
    <select id="scope">
      <option value="all">全部质量/类型</option>
      <option value="S">官方 S 级</option>
      <option value="carry">S级主C相关</option>
      <option value="used">S级上场相关</option>
      <option value="wild">野路子/非官方C</option>
    </select>
    <button id="clearBtn">清空</button>
  </div>

  <div class="tiles" id="tiles"></div>

  <div class="layout">
    <main class="main">
      <section class="section" id="view-overview"></section>
      <section class="section" id="view-data"></section>
      <section class="section" id="view-skills"></section>
      <section class="section" id="view-items"></section>
      <section class="section" id="view-outliers"></section>
    </main>
    <aside class="side">
      <div class="panel">
        <h2>当前焦点</h2>
        <div id="detail" class="detailBody"></div>
      </div>
    </aside>
  </div>
</div>

<script src="data.js"></script>
<script>
"use strict";
const A = window.AUDIT;
const $ = id => document.getElementById(id);
const fmt = n => Number(n || 0).toLocaleString("en-US");
const state = { view: "overview", q: "", severity: "all", scope: "all", selected: null };
const severityRank = { P1: 0, P2: 1, P3: 2 };
const views = [
  ["overview", "总览"],
  ["data", "数据一致性"],
  ["skills", "技能解析"],
  ["items", "装备覆盖"],
  ["outliers", "异常组合"],
];

const savedTheme = localStorage.getItem("audit-theme");
if (savedTheme) document.documentElement.dataset.theme = savedTheme;

function textOf(x) {
  if (x == null) return "";
  if (typeof x === "string" || typeof x === "number" || typeof x === "boolean") return String(x);
  if (Array.isArray(x)) return x.map(textOf).join(" ");
  return Object.values(x).map(textOf).join(" ");
}
function matches(row) {
  state.q = $("search") ? $("search").value : state.q;
  state.severity = $("severity") ? $("severity").value : state.severity;
  state.scope = $("scope") ? $("scope").value : state.scope;
  const hay = textOf(row).toLowerCase();
  const q = state.q.trim().toLowerCase();
  if (q && !hay.includes(q)) return false;
  if (state.severity !== "all" && row.severity && row.severity !== state.severity) return false;
  if (state.scope === "S" && row.quality && row.quality !== "S") return false;
  if (state.scope === "carry" && row.official && !row.official.sCarry) return false;
  if (state.scope === "used" && row.official && !row.official.sUsed) return false;
  if (state.scope === "wild" && row.flag && !/野路子|官方非C/.test(row.flag)) return false;
  return true;
}
function sevBadge(s) {
  return `<span class="sev ${s || "P3"}">${s || "P3"}</span>`;
}
function pill(s, cls = "") {
  return `<span class="pill ${cls}">${escapeHtml(s)}</span>`;
}
function escapeHtml(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
}
function compactLine(s, n = 90) {
  s = String(s || "");
  return s.length > n ? s.slice(0, n - 1) + "…" : s;
}
function setSelected(title, meta, body, raw) {
  state.selected = { title, meta, body, raw };
  renderDetail();
}
function renderDetail() {
  const box = $("detail");
  if (!state.selected) {
    const first = A.data.contactIssues.find(x => x.severity === "P1") || A.skills.highRiskHeroes[0];
    if (first) {
      setSelected("等待选择", "点击任意表格行查看原始字段", [
        ["最高优先", first.line || first.name],
        ["报告", "../../docs/reports/数值与Bug审计.md"],
      ], first);
      return;
    }
  }
  const s = state.selected;
  box.innerHTML = `
    <div class="detailTitle">${escapeHtml(s.title)}</div>
    <div class="detailMeta">${escapeHtml(s.meta || "")}</div>
    ${(s.body || []).map(([k,v]) => `<div class="kv"><b>${escapeHtml(k)}</b><span>${escapeHtml(v)}</span></div>`).join("")}
    <pre>${escapeHtml(JSON.stringify(s.raw, null, 2))}</pre>
  `;
}
function table(headers, rows, renderRow) {
  if (!rows.length) return `<div class="empty">没有匹配项</div>`;
  return `<div class="tableScroll"><table><thead><tr>${headers.map(h => `<th>${h}</th>`).join("")}</tr></thead><tbody>${rows.map(renderRow).join("")}</tbody></table></div>`;
}
function attachRows(rows, prefix, makeDetail) {
  rows.forEach((row, i) => {
    const tr = document.querySelector(`[data-row="${prefix}-${i}"]`);
    if (!tr) return;
    tr.addEventListener("click", () => {
      const d = makeDetail(row);
      setSelected(d.title, d.meta, d.body, row);
    });
  });
}
function bars(rows, nameKey, valueKey, color = "var(--p3)", limit = 6) {
  const top = rows.slice(0, limit);
  const max = Math.max(1, ...top.map(r => Number(r[valueKey]) || 0));
  return top.map(r => `
    <div class="bar">
      <div class="nm">${escapeHtml(r[nameKey])}</div>
      <div class="track"><div class="fill" style="width:${Math.max(3, (Number(r[valueKey]) || 0) / max * 100)}%;background:${color}"></div></div>
      <div class="val">${fmt(r[valueKey])}</div>
    </div>
  `).join("");
}

function renderChrome() {
  $("subline").textContent = `数据 ${A.version} · 阵容版本 ${A.edition} · 生成 ${A.generated.slice(0, 19).replace("T", " ")}`;
  $("tabs").innerHTML = views.map(([id, label]) => `<button class="tab ${state.view === id ? "active" : ""}" data-view="${id}">${label}</button>`).join("");
  document.querySelectorAll("[data-view]").forEach(btn => btn.addEventListener("click", () => { state.view = btn.dataset.view; render(); }));
  const ds = A.data.summary, ss = A.skills.summary, is = A.items.summary, os = A.outliers.summary;
  const tiles = [
    ["P1 contact", ds.p1ContactIssues, `${ds.contactIssues} 套羁绊异常`, "hot"],
    ["缺失引用", ds.referenceIssues, "hex/equip/monster", ds.referenceIssues ? "warn" : "good"],
    ["高风险技能", ss.highRiskHeroes, `${ss.zeroParsedDamageWithDamageText} 个零解析`, "warn"],
    ["属性漏算", is.basicStatGaps, Object.keys(is.basicGapCounts).join(" / "), "warn"],
    ["未建模特效", is.unmodeledImportantEffects, "装备效果覆盖率", "warn"],
    ["搜索空间", os.heroes + "×" + os.offenseCombos, `基准 ${os.officialBestDps} DPS`, ""],
  ];
  $("tiles").innerHTML = tiles.map(t => `
    <div class="tile">
      <div class="lb">${escapeHtml(t[0])}</div>
      <div class="v ${t[3] || ""}">${escapeHtml(t[1])}</div>
      <div class="d">${escapeHtml(t[2])}</div>
    </div>
  `).join("");
}

function renderOverview() {
  const p1 = A.data.contactIssues.filter(x => x.severity === "P1").slice(0, 8);
  const skill = A.skills.highRiskHeroes.slice(0, 8);
  const effects = A.items.unmodeledImportantEffects.slice(0, 8);
  const wild = A.outliers.nonOfficialCarryOutliers.slice(0, 8);
  $("view-overview").innerHTML = `
    <div class="panel">
      <h2>审计队列</h2>
      <div class="grid2">
        <div class="mini"><h3>最高优先数据问题</h3>${p1.map(x => qitem(x.line, `${x.quality} · ${x.problem.join(" / ")}`, x.severity, "data", x)).join("")}</div>
        <div class="mini"><h3>技能解析高风险</h3>${skill.map(x => qitem(x.name, `${x.skillName} · 风险 ${x.riskScore}`, x.official.sCarry ? "P1" : "P2", "skill", x)).join("")}</div>
        <div class="mini"><h3>未建模装备特效</h3>${effects.map(x => qitem(x.name, `${x.type} · S级 ${x.usedInS} · ${x.tagLabels.join("/")}`, x.usedInS ? "P2" : "P3", "item", x)).join("")}</div>
        <div class="mini"><h3>非官方主C候选</h3>${wild.map(x => qitem(x.hero, `${x.items.join(" + ")} · ${x.dps} DPS`, x.dps >= A.outliers.summary.officialBestDps ? "P1" : "P2", "outlier", x)).join("")}</div>
      </div>
    </div>
    <div class="panel">
      <h2>分布速览</h2>
      <div class="grid2">
        <div class="mini"><h3>contact 严重级别</h3>${bars([{n:"P1",v:A.data.contactIssues.filter(x=>x.severity==="P1").length},{n:"P2",v:A.data.contactIssues.filter(x=>x.severity==="P2").length},{n:"P3",v:A.data.contactIssues.filter(x=>x.severity==="P3").length}], "n", "v", "var(--p1)", 3)}</div>
        <div class="mini"><h3>技能机制标签</h3>${bars(Object.entries(A.skills.summary.utilityTagCounts).map(([name,value]) => ({name, value})), "name", "value", "var(--violet)", 7)}</div>
        <div class="mini"><h3>装备基础属性漏算</h3>${bars(Object.entries(A.items.summary.basicGapCounts).map(([name,value]) => ({name, value})), "name", "value", "var(--p2)", 5)}</div>
        <div class="mini"><h3>异常 DPS Top</h3>${bars(A.outliers.topDps.map(x => ({name:x.hero, value:x.dps})), "name", "value", "var(--cyan)", 7)}</div>
      </div>
    </div>
  `;
  attachQitems();
}
function qitem(title, meta, sev, type, raw) {
  const id = queueItems.push({ title, meta, sev, type, raw }) - 1;
  return `<div class="qitem" data-qitem="${id}"><div class="qtop">${sevBadge(sev)}<div class="qtitle">${escapeHtml(title)}</div></div><div class="qmeta">${escapeHtml(compactLine(meta, 120))}</div></div>`;
}
let queueItems = [];
function attachQitems() {
  document.querySelectorAll("[data-qitem]").forEach(el => {
    el.addEventListener("click", () => {
      const x = queueItems[Number(el.dataset.qitem)];
      setSelected(x.title, x.meta, [["类型", x.type], ["级别", x.sev]], x.raw);
    });
  });
}

function renderData() {
  const contacts = A.data.contactIssues.filter(matches);
  const refs = A.data.referenceIssues.filter(matches);
  const dups = A.data.duplicateHeroNames.filter(matches);
  $("view-data").innerHTML = `
    <div class="panel">
      <h2>阵容 contact 羁绊异常</h2>
      ${table(["级别","阵容","质量","官方","反推","问题摘要"], contacts, (x,i) => `
        <tr class="clickable" data-row="contact-${i}">
          <td style="width:48px">${sevBadge(x.severity)}</td>
          <td>${escapeHtml(x.line)}</td>
          <td style="width:52px">${escapeHtml(x.quality)}</td>
          <td class="num" style="width:62px">${fmt(x.officialCount)}</td>
          <td class="num" style="width:62px">${fmt(x.inferredActiveCount)}</td>
          <td><div class="problem">${escapeHtml((x.problem || []).join(" / "))}</div></td>
        </tr>`)}
    </div>
    <div class="panel">
      <h2>引用缺失</h2>
      ${table(["级别","阵容","类型","ID","位置"], refs, (x,i) => `
        <tr class="clickable" data-row="ref-${i}">
          <td>${sevBadge(x.severity)}</td><td>${escapeHtml(x.line)}</td><td>${escapeHtml(x.kind)}</td><td>${escapeHtml(x.id)}</td><td>${escapeHtml(x.where)}</td>
        </tr>`)}
    </div>
    <div class="panel">
      <h2>同名英雄多记录</h2>
      ${table(["英雄","记录数","ID","技能名","面板变体"], dups, (x,i) => `
        <tr class="clickable" data-row="dup-${i}">
          <td>${escapeHtml(x.name)}</td><td class="num">${x.count}</td><td>${escapeHtml(x.ids.join(", "))}</td><td>${escapeHtml(x.skillNames.join(" / "))}</td><td class="num">${x.statVariantCount}</td>
        </tr>`)}
    </div>`;
  attachRows(contacts, "contact", x => ({ title:x.line, meta:`${x.severity} · 官方 ${x.officialCount} / 反推 ${x.inferredActiveCount}`, body:[["质量",x.quality],["缺失",(x.missing||[]).join(" / ")],["数量不一致",(x.mismatchedNums||[]).map(t=>`${t.name} ${t.official}/${t.inferred}`).join(" / ")]], raw:x }));
  attachRows(refs, "ref", x => ({ title:x.line, meta:`${x.severity} · 缺失 ${x.kind}`, body:[["ID",x.id],["位置",x.where]], raw:x }));
  attachRows(dups, "dup", x => ({ title:x.name, meta:`${x.count} 条同名记录`, body:[["ID",x.ids.join(", ")],["技能",x.skillNames.join(" / ")],["价格",x.prices.join(", ")]], raw:x }));
}

function renderSkills() {
  const high = A.skills.highRiskHeroes.filter(matches);
  const zero = A.skills.zeroParsedDamageWithDamageText.filter(matches);
  const ignored = A.skills.ignoredDamageHeroes.filter(matches).slice(0, 80);
  $("view-skills").innerHTML = `
    <div class="panel">
      <h2>技能解析高风险</h2>
      ${table(["风险","英雄","费用","技能","吃到","漏伤害","机制标签","S级相关"], high, (x,i) => `
        <tr class="clickable" data-row="skill-${i}">
          <td class="num">${x.riskScore}</td><td>${escapeHtml(x.name)}</td><td class="num">${x.price}</td><td>${escapeHtml(x.skillName)}</td>
          <td class="num">${x.consumedDamageGroups}</td><td class="num">${x.ignoredDamageGroups}</td>
          <td><div class="tags">${(x.utilityLabels||[]).map(t=>pill(t)).join("")}</div></td>
          <td>${x.official.sCarry ? pill("S主C","hot") : ""}${x.official.sUsed ? pill("S上场","warn") : ""}</td>
        </tr>`)}
    </div>
    <div class="panel">
      <h2>有伤害文本但模型零解析</h2>
      ${table(["英雄","费用","技能","漏掉片段","机制标签"], zero, (x,i) => `
        <tr class="clickable" data-row="zero-${i}">
          <td>${escapeHtml(x.name)}</td><td class="num">${x.price}</td><td>${escapeHtml(x.skillName)}</td>
          <td><div class="problem">${escapeHtml(x.groups.filter(g=>g.ignoredDamage).map(g=>`${g.label}(${g.reason})`).join(" / "))}</div></td>
          <td>${(x.utilityLabels||[]).map(t=>pill(t)).join("")}</td>
        </tr>`)}
    </div>
    <div class="panel">
      <h2>漏掉伤害组</h2>
      ${table(["英雄","技能","漏伤害组数","风险","标签"], ignored, (x,i) => `
        <tr class="clickable" data-row="ignored-${i}">
          <td>${escapeHtml(x.name)}</td><td>${escapeHtml(x.skillName)}</td><td class="num">${x.ignoredDamageGroups}</td><td class="num">${x.riskScore}</td><td>${(x.utilityLabels||[]).map(t=>pill(t)).join("")}</td>
        </tr>`)}
    </div>`;
  const detail = x => ({ title:x.name, meta:`${x.skillName} · 风险 ${x.riskScore}`, body:[["费用",x.price],["吃到伤害组",x.consumedDamageGroups],["漏掉伤害组",x.ignoredDamageGroups],["标签",(x.utilityLabels||[]).join(" / ")]], raw:x });
  attachRows(high, "skill", detail);
  attachRows(zero, "zero", detail);
  attachRows(ignored, "ignored", detail);
}

function renderItems() {
  const gaps = A.items.basicStatGaps.filter(matches);
  const effects = A.items.unmodeledImportantEffects.filter(matches);
  $("view-items").innerHTML = `
    <div class="panel">
      <h2>基础属性漏解析</h2>
      ${table(["装备","类型","漏掉属性","S级出现","主C出现"], gaps, (x,i) => `
        <tr class="clickable" data-row="gap-${i}">
          <td>${escapeHtml(x.name)}</td><td>${escapeHtml(x.type)}</td><td>${escapeHtml(x.raw)}</td><td class="num">${x.usedInS}</td><td class="num">${x.carryUses}</td>
        </tr>`)}
    </div>
    <div class="panel">
      <h2>高价值但未建模的装备特效</h2>
      ${table(["装备","类型","标签","S级出现","主C出现","效果摘要"], effects, (x,i) => `
        <tr class="clickable" data-row="effect-${i}">
          <td>${escapeHtml(x.name)}</td><td>${escapeHtml(x.type)}</td><td>${(x.tagLabels||[]).map(t=>pill(t)).join("")}</td>
          <td class="num">${x.usedInS}</td><td class="num">${x.carryUses}</td><td><div class="problem">${escapeHtml(x.desc)}</div></td>
        </tr>`)}
    </div>`;
  attachRows(gaps, "gap", x => ({ title:x.name, meta:`${x.type} · 基础属性漏解析`, body:[["漏掉属性",x.raw],["S级出现",x.usedInS],["主C出现",x.carryUses]], raw:x }));
  attachRows(effects, "effect", x => ({ title:x.name, meta:`${x.type} · 未建模特效`, body:[["标签",(x.tagLabels||[]).join(" / ")],["S级出现",x.usedInS],["主C出现",x.carryUses],["效果",x.desc]], raw:x }));
}

function renderOutliers() {
  const top = A.outliers.topDps.filter(matches);
  const wild = A.outliers.nonOfficialCarryOutliers.filter(matches);
  const dup = A.outliers.duplicateItemOutliers.filter(matches);
  const tank = A.outliers.topTankByHero.filter(matches);
  $("view-outliers").innerHTML = `
    <div class="panel">
      <h2>全局 DPS Top</h2>
      ${table(["英雄","星级","装备","DPS","平A","技能","特效","标记"], top, (x,i) => outlierRow(x, "top", i))}
    </div>
    <div class="panel">
      <h2>非官方主C高 DPS 候选</h2>
      ${table(["英雄","费用","星级","装备","DPS","标记"], wild, (x,i) => `
        <tr class="clickable" data-row="wild-${i}"><td>${escapeHtml(x.hero)}</td><td class="num">${x.price}</td><td class="num">${x.star}</td><td>${escapeHtml(x.items.join(" + "))}</td><td class="num">${x.dps}</td><td>${pill(x.flag, x.flag==="野路子"?"hot":"warn")}</td></tr>`)}
    </div>
    <div class="panel">
      <h2>重复装备异常候选</h2>
      ${table(["英雄","星级","装备","DPS","标记"], dup, (x,i) => `
        <tr class="clickable" data-row="dupItem-${i}"><td>${escapeHtml(x.hero)}</td><td class="num">${x.star}</td><td>${escapeHtml(x.items.join(" + "))}</td><td class="num">${x.dps}</td><td>${pill(x.flag)}</td></tr>`)}
    </div>
    <div class="panel">
      <h2>EHP Top</h2>
      ${table(["英雄","费用","装备","EHP"], tank, (x,i) => `
        <tr class="clickable" data-row="tank-${i}"><td>${escapeHtml(x.hero)}</td><td class="num">${x.price}</td><td>${escapeHtml(x.items.join(" + "))}</td><td class="num">${x.ehp}</td></tr>`)}
    </div>`;
  const detail = x => ({ title:x.hero, meta:`${x.items.join(" + ")} · ${x.dps || x.ehp} ${x.dps ? "DPS" : "EHP"}`, body:[["费用",x.price],["星级",x.star],["标记",x.flag || ""],["装备",x.items.join(" + ")]], raw:x });
  attachRows(top, "top", detail);
  attachRows(wild, "wild", detail);
  attachRows(dup, "dupItem", detail);
  attachRows(tank, "tank", detail);
}
function outlierRow(x, prefix, i) {
  return `<tr class="clickable" data-row="${prefix}-${i}">
    <td>${escapeHtml(x.hero)}</td><td class="num">${x.star}</td><td>${escapeHtml(x.items.join(" + "))}</td><td class="num">${x.dps}</td>
    <td class="num">${x.auto}</td><td class="num">${x.spell}</td><td class="num">${x.proc}</td><td>${pill(x.flag, x.flag==="野路子"?"hot":x.flag==="官方非C"?"warn":"")}</td>
  </tr>`;
}

function render() {
  queueItems = [];
  renderChrome();
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  $(`view-${state.view}`).classList.add("active");
  if (state.view === "overview") renderOverview();
  if (state.view === "data") renderData();
  if (state.view === "skills") renderSkills();
  if (state.view === "items") renderItems();
  if (state.view === "outliers") renderOutliers();
  renderDetail();
}

$("search").addEventListener("input", e => { state.q = e.target.value; render(); });
$("severity").addEventListener("change", e => { state.severity = e.target.value; render(); });
$("scope").addEventListener("change", e => { state.scope = e.target.value; render(); });
$("clearBtn").addEventListener("click", () => {
  $("search").value = "";
  $("severity").value = "all";
  $("scope").value = "all";
  state.q = "";
  state.severity = "all";
  state.scope = "all";
  render();
});
$("themeBtn").addEventListener("click", () => {
  const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
  document.documentElement.dataset.theme = next;
  localStorage.setItem("audit-theme", next);
});
$("modelBtn").addEventListener("click", () => { location.href = "../%E5%8F%AF%E8%A7%86%E5%8C%96/index.html"; });
$("reportBtn").addEventListener("click", () => { location.href = "../../docs/reports/%E6%95%B0%E5%80%BC%E4%B8%8EBug%E5%AE%A1%E8%AE%A1.md"; });

render();
</script>
</body>
</html>
