<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<title>比赛模式 · 金铲铲 S18</title>
<style>
:root {
  --plane:#f9f9f7; --surface:#fcfcfb; --ink:#0b0b0b; --ink2:#52514e; --muted:#898781;
  --grid:#e1e0d9; --border:rgba(11,11,11,.12);
  --s1:#2a78d6; --s2:#1baf7a; --s3:#eda100; --s5:#4a3aa7; --s6:#e34948;
}
:root[data-theme="dark"] {
  --plane:#0d0d0d; --surface:#1a1a19; --ink:#fff; --ink2:#c3c2b7; --muted:#898781;
  --grid:#2c2c2a; --border:rgba(255,255,255,.12);
  --s1:#3987e5; --s2:#199e70; --s3:#c98500; --s5:#9085e9; --s6:#e66767;
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --plane:#0d0d0d; --surface:#1a1a19; --ink:#fff; --ink2:#c3c2b7; --muted:#898781;
    --grid:#2c2c2a; --border:rgba(255,255,255,.12);
    --s1:#3987e5; --s2:#199e70; --s3:#c98500; --s5:#9085e9; --s6:#e66767;
  }
}
* { box-sizing:border-box; margin:0; }
html, body { height:100%; overflow:hidden; }
body { background:var(--plane); color:var(--ink); font:18px/1.45 system-ui,-apple-system,"Segoe UI",sans-serif; }
button, input { font:inherit; }
.app { height:100vh; display:grid; grid-template-rows:auto auto 1fr; gap:12px; padding:16px; max-width:1280px; margin:0 auto; }
.top { display:grid; grid-template-columns:minmax(0,1fr) auto auto auto auto auto auto auto; gap:10px; align-items:center; }
.voice { height:62px; border:2px solid var(--s2); border-radius:12px; background:var(--surface); color:var(--ink); padding:0 18px; font-size:24px; outline:none; }
.bigBtn { min-height:58px; border:1px solid var(--border); border-radius:12px; background:var(--surface); color:var(--ink); padding:0 18px; cursor:pointer; font-weight:800; }
.submit { background:var(--s2); color:#fff; border-color:var(--s2); }
.new { background:var(--s6); color:#fff; border-color:var(--s6); }
.theme { color:var(--ink2); }
.settingsBtn { width:58px; padding:0; font-size:25px; }
.llmDot { width:14px; height:14px; border-radius:50%; background:var(--muted); justify-self:center; box-shadow:0 0 0 4px color-mix(in srgb, var(--muted) 15%, transparent); }
.llmDot.work { background:var(--s3); box-shadow:0 0 0 4px color-mix(in srgb, var(--s3) 22%, transparent); }
.llmDot.ok { background:var(--s2); box-shadow:0 0 0 4px color-mix(in srgb, var(--s2) 22%, transparent); }
.llmDot.fail { background:var(--muted); }
.aiMark { display:inline-grid; place-items:center; min-width:24px; height:20px; margin-left:6px; border-radius:999px; background:var(--s5); color:#fff; font-size:12px; font-weight:950; vertical-align:middle; }
.banner { position:fixed; left:50%; top:16px; transform:translateX(-50%); z-index:5; background:var(--s2); color:#fff;
  padding:10px 18px; border-radius:999px; font-weight:900; box-shadow:0 10px 30px rgba(0,0,0,.24); opacity:0; pointer-events:none; transition:opacity .18s; }
.banner.show { opacity:1; }
.status { display:grid; grid-template-columns:1fr; gap:8px; min-height:94px; }
.pending, .signals { display:flex; gap:8px; flex-wrap:wrap; align-items:center; min-height:42px; }
.levelRow, .decisionStateRow, .heroAugRow { display:flex; gap:8px; flex-wrap:wrap; align-items:center; min-height:38px; }
.label { color:var(--muted); font-size:15px; font-weight:800; margin-right:2px; }
.chip, .candidate { min-height:44px; border:1px solid var(--border); border-radius:999px; background:var(--surface); color:var(--ink); padding:6px 14px; cursor:pointer; font-size:18px; }
.chip { border-color:color-mix(in srgb, var(--s2) 55%, var(--border)); }
.derivedChip { min-height:36px; display:inline-flex; align-items:center; border:1px dashed color-mix(in srgb, var(--s5) 65%, var(--border)); border-radius:999px; color:var(--ink2); padding:5px 12px; font-size:16px; font-weight:800; background:color-mix(in srgb, var(--surface) 90%, var(--s5) 10%); }
.levelChip { min-height:36px; border:1px solid var(--border); border-radius:999px; background:var(--plane); color:var(--ink2); padding:4px 11px; cursor:pointer; font-size:16px; font-weight:850; }
.levelChip.on { background:var(--s2); border-color:var(--s2); color:#fff; }
.stateChip { min-height:36px; border:1px solid var(--border); border-radius:999px; background:var(--plane); color:var(--ink2); padding:4px 11px; cursor:pointer; font-size:16px; font-weight:850; }
.stateChip.on { background:var(--s3); border-color:var(--s3); color:#1f1800; }
.healthInput { width:82px; min-height:36px; border:1px solid var(--border); border-radius:8px; background:var(--plane); color:var(--ink); padding:4px 8px; font-size:16px; font-weight:850; outline:none; }
.healthInput:focus { border-color:var(--s3); box-shadow:0 0 0 2px color-mix(in srgb, var(--s3) 18%, transparent); }
.heroAugChip { min-height:36px; border:1px solid var(--border); border-radius:999px; background:var(--plane); color:var(--ink2); padding:4px 13px; cursor:pointer; font-size:16px; font-weight:850; }
.heroAugChip.on { background:var(--s5); border-color:var(--s5); color:#fff; }
.heroAugHint { color:var(--muted); font-size:14px; font-weight:750; }
.candidate { border-color:color-mix(in srgb, var(--s3) 65%, var(--border)); }
.drop { min-width:44px; padding:6px 12px; color:var(--s6); }
.main { min-height:0; display:grid; grid-template-columns:minmax(0,1fr); }
.routeView, .augView { position:relative; min-width:0; min-height:0; overflow:auto; overscroll-behavior:contain; border:1px solid var(--border); border-radius:16px; background:var(--surface); padding:16px 20px; display:grid; grid-template-rows:auto auto 1fr; gap:8px; }
.routeView.clickable { cursor:pointer; }
.routeView.clickable:focus-visible { outline:3px solid color-mix(in srgb, var(--s2) 70%, transparent); outline-offset:3px; }
.rankTop { display:grid; grid-template-columns:minmax(0,1fr) auto; gap:12px; align-items:start; }
.routeName { font-size:32px; font-weight:950; line-height:1.18; overflow-wrap:anywhere; }
.routePoints { font-size:34px; font-weight:950; color:var(--s2); white-space:nowrap; }
.subRank { color:var(--ink2); font-size:17px; overflow-wrap:anywhere; }
.strengthBreak { color:var(--ink2); font-size:16px; overflow-wrap:anywhere; margin-top:4px; }
.evidenceLine { color:var(--ink2); font-size:15px; overflow-wrap:anywhere; margin-top:4px; }
.gateStrip { margin-top:8px; padding:9px 11px; border-radius:10px; border:1px solid var(--border); font-size:17px; font-weight:900; overflow-wrap:anywhere; }
.gateStrip.green { color:#fff; background:var(--s2); border-color:var(--s2); }
.gateStrip.yellow { color:#1f1800; background:color-mix(in srgb, var(--s3) 70%, #fff 30%); border-color:var(--s3); }
.gateStrip.red { color:#fff; background:var(--s6); border-color:var(--s6); }
.formulaLine { color:var(--muted); font-size:14px; margin-top:4px; overflow-wrap:anywhere; }
.sampleStrip { margin-top:5px; padding:5px 9px; border-radius:10px; border:1px solid color-mix(in srgb, var(--s5) 45%, var(--border)); color:var(--ink2); background:color-mix(in srgb, var(--surface) 90%, var(--s5) 10%); font-size:15px; overflow-wrap:anywhere; }
.strategyStrip { margin-top:6px; padding:8px 10px; border-radius:10px; border:1px solid color-mix(in srgb, var(--s1) 55%, var(--border)); color:var(--ink2); background:color-mix(in srgb, var(--surface) 88%, var(--s1) 12%); font-size:16px; font-weight:850; overflow-wrap:anywhere; }
.strategyStrip.ready { color:#fff; background:var(--s2); border-color:var(--s2); }
.heroAugStrip { margin-top:6px; padding:7px 10px; border-radius:10px; border:1px solid var(--border); font-size:16px; font-weight:900; overflow-wrap:anywhere; }
.heroAugStrip.locked, .heroAugStrip.lock { color:#fff; background:var(--s2); border-color:var(--s2); }
.heroAugStrip.resolved { color:#fff; background:var(--s5); border-color:var(--s5); }
.heroAugStrip.waiting, .heroAugStrip.available { color:#1f1800; background:color-mix(in srgb, var(--s3) 70%, #fff 30%); border-color:var(--s3); }
.heroAugStrip.base-only { color:var(--ink2); background:color-mix(in srgb, var(--surface) 82%, var(--muted) 18%); }
.heroAugStrip.closed { color:#fff; background:var(--s6); border-color:var(--s6); }
.decisionGrid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; margin:4px 0 10px; }
.decisionCard { position:relative; border:1px solid var(--grid); border-radius:8px; padding:10px 12px; min-width:0; background:var(--plane); }
.decisionCard.commit { border-color:color-mix(in srgb, var(--s2) 70%, var(--border)); background:color-mix(in srgb, var(--surface) 88%, var(--s2) 12%); }
.decisionCard.commit::before { content:"当前"; position:absolute; right:10px; top:9px; color:var(--s2); font-size:12px; font-weight:950; }
.decisionLabel { color:var(--muted); font-size:13px; font-weight:900; }
.decisionValue { color:var(--ink); font-size:18px; font-weight:950; margin-top:3px; overflow-wrap:anywhere; }
.decisionNote { color:var(--ink2); font-size:13px; margin-top:3px; overflow-wrap:anywhere; }
.routeFlow { display:grid; grid-template-columns:minmax(0,1fr) 54px minmax(0,1fr) 54px minmax(0,1fr); gap:0; align-items:stretch; margin:4px 0 10px; }
.flowNode { min-width:0; min-height:116px; border:1px solid var(--grid); border-radius:8px; padding:11px 12px; background:var(--plane); }
.flowNode.active { border-color:color-mix(in srgb, var(--s2) 68%, var(--border)); background:color-mix(in srgb, var(--surface) 89%, var(--s2) 11%); }
.flowNode.active.red { border-color:color-mix(in srgb, var(--s6) 70%, var(--border)); background:color-mix(in srgb, var(--surface) 92%, var(--s6) 8%); }
.flowNode.active.yellow { border-color:color-mix(in srgb, var(--s3) 68%, var(--border)); background:color-mix(in srgb, var(--surface) 91%, var(--s3) 9%); }
.flowKicker { display:flex; align-items:center; justify-content:space-between; gap:8px; color:var(--muted); font-size:12px; font-weight:950; }
.flowBadge { border-radius:999px; padding:2px 8px; color:#fff; background:var(--s2); font-size:11px; white-space:nowrap; }
.flowNode.red .flowBadge { background:var(--s6); }
.flowNode.yellow .flowBadge { color:#211800; background:var(--s3); }
.flowTitle { margin-top:5px; color:var(--ink); font-size:18px; line-height:1.35; font-weight:950; overflow-wrap:anywhere; }
.flowMeta { margin-top:5px; color:var(--ink2); font-size:13px; overflow-wrap:anywhere; }
.flowArrow { display:grid; place-content:center; justify-items:center; color:var(--muted); }
.flowArrow b { font-size:25px; line-height:1; color:var(--s2); }
.flowArrow small { margin-top:5px; font-size:11px; font-weight:900; }
.commandPanel { margin:4px 0 10px; padding:13px; border:1px solid color-mix(in srgb, var(--s2) 58%, var(--border)); border-left:6px solid var(--s2); border-radius:8px; background:color-mix(in srgb, var(--surface) 93%, var(--s2) 7%); }
.commandPanel.yellow { border-color:color-mix(in srgb, var(--s3) 66%, var(--border)); border-left-color:var(--s3); background:color-mix(in srgb, var(--surface) 92%, var(--s3) 8%); }
.commandPanel.red { border-color:color-mix(in srgb, var(--s6) 66%, var(--border)); border-left-color:var(--s6); background:color-mix(in srgb, var(--surface) 93%, var(--s6) 7%); }
.commandGrid { display:grid; grid-template-columns:1.3fr .55fr 1fr; gap:8px; margin-top:11px; }
.commandCell { min-width:0; min-height:88px; border:1px solid var(--grid); border-radius:8px; padding:9px 10px; background:var(--surface); }
.commandCell.primary { border-color:color-mix(in srgb, var(--s2) 62%, var(--border)); box-shadow:inset 3px 0 0 var(--s2); }
.commandCell.switch { border-color:color-mix(in srgb, var(--s3) 58%, var(--border)); }
.commandCell.stay { border-color:color-mix(in srgb, var(--s1) 45%, var(--border)); }
.commandStep { color:var(--muted); font-size:12px; font-weight:950; }
.commandValue { margin-top:4px; color:var(--ink); font-size:17px; line-height:1.36; font-weight:900; overflow-wrap:anywhere; }
.keyFlags { display:flex; flex-wrap:wrap; gap:7px; margin-top:9px; }
.keyFlag { min-width:0; max-width:100%; border:1px solid var(--border); border-radius:999px; padding:4px 10px; color:var(--ink2); background:var(--surface); font-size:13px; font-weight:850; overflow-wrap:anywhere; }
.keyFlag.green { color:var(--s2); border-color:color-mix(in srgb, var(--s2) 58%, var(--border)); }
.keyFlag.yellow { color:color-mix(in srgb, var(--s3) 76%, var(--ink)); border-color:color-mix(in srgb, var(--s3) 60%, var(--border)); }
.keyFlag.red { color:var(--s6); border-color:color-mix(in srgb, var(--s6) 62%, var(--border)); }
.keyFlag.event { color:var(--s5); border-color:color-mix(in srgb, var(--s5) 58%, var(--border)); }
.pivotSection { margin-top:11px; border-top:1px solid color-mix(in srgb, var(--ink) 10%, transparent); padding-top:10px; }
.pivotHead { display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:8px; }
.pivotTitle { color:var(--ink); font-size:17px; font-weight:950; }
.pivotHint { color:var(--muted); font-size:12px; font-weight:800; text-align:right; }
.pivotMap { display:grid; grid-template-columns:180px 34px minmax(0,1fr); gap:8px; align-items:stretch; }
.pivotOrigin { display:grid; align-content:center; border:1px solid color-mix(in srgb, var(--s6) 58%, var(--border)); border-radius:8px; padding:10px 11px; background:var(--surface); }
.pivotOrigin.green { border-color:color-mix(in srgb, var(--s2) 58%, var(--border)); }
.pivotOrigin.yellow { border-color:color-mix(in srgb, var(--s3) 58%, var(--border)); }
.pivotOriginLabel { color:var(--muted); font-size:12px; font-weight:950; }
.pivotOriginValue { margin-top:4px; color:var(--ink); font-size:17px; font-weight:950; overflow-wrap:anywhere; }
.pivotRail { position:relative; min-height:100%; }
.pivotRail::before { content:""; position:absolute; left:0; right:0; top:50%; height:2px; background:color-mix(in srgb, var(--s2) 56%, var(--grid)); }
.pivotRail::after { content:""; position:absolute; right:0; top:calc(50% - 5px); width:0; height:0; border-top:6px solid transparent; border-bottom:6px solid transparent; border-left:8px solid var(--s2); }
.pivotBranches { display:grid; gap:7px; min-width:0; }
.pivotBranch { display:grid; grid-template-columns:minmax(145px,.8fr) 26px minmax(190px,1.2fr) auto; gap:8px; align-items:center; min-width:0; border:1px solid var(--grid); border-radius:8px; padding:8px 10px; background:var(--surface); }
.pivotBranch:first-child { border-color:color-mix(in srgb, var(--s2) 62%, var(--border)); }
.pivotTrigger { min-width:0; }
.pivotTrigger strong { display:block; color:var(--s2); font-size:16px; font-weight:950; overflow-wrap:anywhere; }
.pivotTrigger small { display:block; margin-top:2px; color:var(--ink2); font-size:12px; overflow-wrap:anywhere; }
.pivotGo { color:var(--s2); font-size:20px; font-weight:950; text-align:center; }
.pivotTarget { min-width:0; color:var(--ink); font-size:16px; font-weight:950; overflow-wrap:anywhere; }
.pivotTarget small { display:block; margin-top:2px; color:var(--muted); font-size:11px; font-weight:800; }
.pivotMetrics { display:grid; justify-items:end; gap:2px; color:var(--ink2); font-size:11px; white-space:nowrap; }
.pivotGain { color:var(--s2); font-size:13px; font-weight:950; }
.noPivot { border:1px dashed var(--border); border-radius:8px; padding:10px 12px; color:var(--ink2); background:var(--surface); font-size:14px; font-weight:850; }
.supportActions { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; margin:8px 0; }
.supportAction { min-width:0; border-left:4px solid var(--s2); border-radius:8px; padding:8px 11px; background:color-mix(in srgb, var(--surface) 90%, var(--s2) 10%); color:var(--ink); font-size:16px; font-weight:850; overflow-wrap:anywhere; }
.modelEvidence { margin-top:9px; border:1px solid var(--grid); border-radius:8px; background:var(--plane); overflow:hidden; cursor:default; }
.modelEvidence > summary { min-height:46px; display:flex; align-items:center; justify-content:space-between; gap:12px; padding:9px 12px; color:var(--ink); cursor:pointer; font-size:16px; font-weight:950; list-style:none; }
.modelEvidence > summary::-webkit-details-marker { display:none; }
.modelEvidence > summary::after { content:"展开"; color:var(--s2); font-size:13px; }
.modelEvidence[open] > summary::after { content:"收起"; }
.evidenceSummary { color:var(--muted); font-size:13px; font-weight:800; text-align:right; }
.evidenceBody { padding:0 12px 12px; border-top:1px solid var(--grid); }
.compactRank { display:grid; grid-template-columns:minmax(0,1fr) auto; gap:10px; align-items:center; margin-top:10px; }
.compactRoute { color:var(--ink); font-size:19px; font-weight:950; overflow-wrap:anywhere; }
.compactScore { color:var(--s2); font-size:22px; font-weight:950; white-space:nowrap; }
.portfolioLine { color:var(--ink2); font-size:14px; font-weight:800; margin:-2px 0 8px; overflow-wrap:anywhere; }
.lockBtn { min-height:34px; margin-top:7px; border:1px solid var(--s2); border-radius:8px; background:transparent; color:var(--s2); padding:3px 9px; cursor:pointer; font-size:14px; font-weight:900; }
.lockBtn.on { background:var(--s2); color:#fff; }
.reachBox { color:var(--ink2); font-size:16px; line-height:1.45; margin-top:4px; overflow-wrap:anywhere; }
.reachToggle { margin-left:8px; border:0; background:transparent; color:var(--s2); cursor:pointer; font-weight:900; padding:0; }
.openHint { color:var(--s2); font-size:15px; font-weight:900; margin-top:4px; }
.actions { display:grid; gap:10px; align-content:start; margin-top:6px; }
.action { min-height:50px; border-left:5px solid var(--s2); background:color-mix(in srgb, var(--surface) 88%, var(--s2) 12%);
  border-radius:10px; padding:10px 14px; font-size:22px; font-weight:850; }
.meta { display:flex; flex-wrap:wrap; gap:10px; margin-top:8px; min-width:0; }
.metric { border:1px solid var(--grid); border-radius:10px; padding:9px 11px; min-width:0; }
.metric { flex:1 1 180px; }
.metric .lb { color:var(--muted); font-size:14px; display:flex; justify-content:space-between; gap:8px; min-width:0; }
.metric .lb span { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.metric .bar { height:7px; border-radius:999px; background:color-mix(in srgb, var(--s2) 14%, transparent); overflow:hidden; margin-top:6px; }
.metric .bar i { display:block; height:100%; border-radius:999px; background:var(--s2); }
.metric.item .bar i { background:var(--s1); }
.metric.aug .bar i { background:var(--s3); }
.metric.trait .bar i { background:var(--s5); }
.unheardLine { position:absolute; left:20px; right:20px; bottom:10px; color:var(--muted); font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; pointer-events:none; }
.augCards { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:14px; min-height:0; }
.augCard { border:2px solid var(--border); border-radius:16px; background:var(--surface); padding:18px; cursor:pointer; display:grid; gap:10px; align-content:start; }
.augCard.best { border-color:var(--s2); background:color-mix(in srgb, var(--surface) 88%, var(--s2) 12%); }
.augSelect { border:0; background:transparent; color:inherit; padding:0; text-align:left; cursor:pointer; display:grid; gap:10px; }
.augSlotMeta { display:flex; align-items:center; justify-content:space-between; gap:8px; color:var(--muted); font-size:14px; font-weight:850; }
.augReroll { min-height:44px; border:1px solid var(--border); border-radius:10px; background:var(--plane); color:var(--ink2); font-size:16px; font-weight:900; cursor:pointer; }
.augReroll:disabled { opacity:.42; cursor:not-allowed; }
.augWaiting { min-height:120px; display:grid; place-items:center; color:var(--s3); font-size:21px; font-weight:950; text-align:center; }
.augName { font-size:28px; font-weight:950; }
.augVerdict { font-size:19px; color:var(--ink2); }
.augMechanic { font-size:17px; color:var(--ink); font-weight:800; }
.augMissing { color:var(--s6); font-size:16px; font-weight:850; }
.augEvidence { color:var(--muted); font-size:15px; }
.augStatus { padding:9px 12px; border:1px solid color-mix(in srgb, var(--s3) 55%, var(--border)); border-radius:10px; background:color-mix(in srgb, var(--surface) 86%, var(--s3) 14%); color:var(--ink2); font-size:17px; font-weight:850; }
.empty { height:100%; display:grid; place-items:center; color:var(--muted); font-size:24px; text-align:center; padding:20px; }
.settingsPanel { position:fixed; right:16px; top:88px; z-index:8; width:min(520px, calc(100vw - 32px)); border:1px solid var(--border); border-radius:16px; background:var(--surface); box-shadow:0 18px 46px rgba(0,0,0,.28); padding:18px; display:grid; gap:12px; }
.settingsPanel h2 { font-size:24px; line-height:1.2; }
.settingsPanel label { display:grid; gap:6px; color:var(--ink2); font-size:15px; font-weight:800; }
.settingsPanel input { height:44px; border:1px solid var(--border); border-radius:10px; background:var(--plane); color:var(--ink); padding:0 12px; font-size:16px; outline:none; }

<script>
"use strict";
const LS = "jcc-match-";
const LLM_LS = "jcc-match-llm-";
const UNHEARD_LOG_KEY = "jcc-match-unheard-log";
const MATCH_LOG_KEY = "jcc-match-log";
const MATCH_LOG_HISTORY_KEY = "jcc-match-log-history";
const $ = id => document.getElementById(id);
const esc = MatcherCore.escText;
const UNIT_PRICES = Object.fromEntries((STAGE2_MATCHER.options.unitSearch || []).map(x => [x.name, x.price]));
const UNIT_TRAITS = Object.fromEntries((STAGE2_MATCHER.options.unitSearch || []).map(x => [x.name, x.traits || []]));
const DEFAULT_LEVEL = MatcherCore.DEFAULT_LEVEL || 6;

const LEVEL_CHOICES = Array.from({ length: MAX_LEVEL - MIN_LEVEL + 1 }, (_, i) => MIN_LEVEL + i);
const HERO_AUGMENT_CHOICES = ["unknown", "2-1", "3-2", "4-2"];
const STAGE_CHOICES = ["unknown", "2-1", "2-5", "3-1", "3-2", "3-5", "4-1", "4-2", "4-5", "5-1", "5-5", "6-1"];
const GOLD_CHOICES = [
  { value: "unknown", label: "金币未知" },
  { value: "0", label: "0-9金" },
  { value: "10", label: "10-19金" },
  { value: "20", label: "20-29金" },
  { value: "30", label: "30-39金" },
  { value: "40", label: "40-49金" },
  { value: "50", label: "50+金" },
];
const HERO_AUGMENT_NAMES = new Set((STAGE2_MATCHER.options.heroAugments || []).map(row => row && row.name).filter(Boolean));
const savedTheme = localStorage.getItem(LS + "theme");
if (savedTheme) document.documentElement.dataset.theme = savedTheme;

let signals = [];
let currentLevel = normalizeLevel(localStorage.getItem(LS + "level"));
let currentHeroAugmentRound = normalizeHeroAugmentRound(localStorage.getItem(LS + "hero-augment-round"));
let currentStage = normalizeStage(localStorage.getItem(LS + "stage"));
let currentGold = normalizeGold(localStorage.getItem(LS + "gold"));
let currentHealth = normalizeHealth(localStorage.getItem(LS + "health"));
let manualLockId = localStorage.getItem(LS + "manual-lock") || "";
let pending = [];
let unheard = [];
let augChoices = null;
let heroAugmentOffer = null;
let pendingAugmentRerollSlot = -1;
let lastExecutionId = "";
let lastExecutionName = "";
let lastExecutionFamily = "";
let lastRenderedTop = null;
let lastDetailRow = null;
let expandedReachId = "";
let bannerTimer = null;
let llmSeq = 0;
let llmAbortController = null;
let isComposing = false;

function load() {
  let rows = [];
  try { rows = JSON.parse(localStorage.getItem(LS + "signals") || "[]"); } catch (e) { rows = []; }
  signals = [];
  if (!Array.isArray(rows)) return;
  const heldItems = rows.filter(row => row && row.kind === "items" && row.holder);
  rows.filter(row => !(row && row.kind === "items" && row.holder)).forEach(row => addSignal(row, true));
  heldItems.forEach(row => addSignal(row, true));
  try { heroAugmentOffer = normalizeHeroOffer(JSON.parse(localStorage.getItem(LS + "hero-augment-offer") || "null")); } catch (e) { heroAugmentOffer = null; }
  if (heroAugmentOffer && heroAugmentOffer.status === "offered") {
    augChoices = heroAugmentOffer.slots.filter(slot => slot.name).map(slot => ({ kind: "augments", value: slot.name, label: slot.name }));
  }
}
function save() {
  localStorage.setItem(LS + "signals", JSON.stringify(signals));
  localStorage.setItem(LS + "level", String(currentLevel));
  localStorage.setItem(LS + "hero-augment-round", currentHeroAugmentRound);
  localStorage.setItem(LS + "stage", currentStage);
  localStorage.setItem(LS + "gold", currentGold);
  localStorage.setItem(LS + "health", currentHealth);
  if (manualLockId) localStorage.setItem(LS + "manual-lock", manualLockId);
  else localStorage.removeItem(LS + "manual-lock");
  if (heroAugmentOffer) localStorage.setItem(LS + "hero-augment-offer", JSON.stringify(heroAugmentOffer));
  else localStorage.removeItem(LS + "hero-augment-offer");
}
function normalizeHeroOffer(offer) {
  if (!offer || !Array.isArray(offer.slots)) return null;
  return {
    round: normalizeHeroAugmentRound(offer.round),
    status: offer.status === "selected" ? "selected" : "offered",
    slots: offer.slots.slice(0, 3).map((slot, index) => ({
      slot: index,
      name: HERO_AUGMENT_NAMES.has(slot && slot.name) ? slot.name : "",
      seen: [...new Set([...(slot && slot.seen || []), slot && slot.name].filter(name => HERO_AUGMENT_NAMES.has(name)))],
      rerollsRemaining: Number.isFinite(Number(slot && slot.rerollsRemaining)) ? Math.max(0, Math.min(3, Number(slot.rerollsRemaining))) : 3,
      waiting: Boolean(slot && slot.waiting),
    })),
  };
}
function createHeroOffer(choices) {
  const names = (choices || []).map(row => row && row.value).filter(name => HERO_AUGMENT_NAMES.has(name)).slice(0, 3);
  if (currentHeroAugmentRound === "unknown" || names.length !== 3) return null;
  return normalizeHeroOffer({
    round: currentHeroAugmentRound,
    status: "offered",
    slots: names.map((name, slot) => ({ slot, name, seen: [name], rerollsRemaining: 3, waiting: false })),
  });
}
function normalizeLevel(level) {
  return Math.max(MIN_LEVEL, Math.min(MAX_LEVEL, Number(level) || DEFAULT_LEVEL));
}
function setLevel(level, defer) {
  const n = normalizeLevel(level);
  currentLevel = n;
  if (defer) return;
  save();
  render();
}
function normalizeHeroAugmentRound(value) {
  return MatcherCore.normalizeHeroAugmentRound ? MatcherCore.normalizeHeroAugmentRound(value) : (HERO_AUGMENT_CHOICES.includes(value) ? value : "unknown");
}
function setHeroAugmentRound(round, defer) {
  const next = normalizeHeroAugmentRound(round);
  if (heroAugmentOffer && heroAugmentOffer.round !== next) {
    heroAugmentOffer = null;
    augChoices = null;
    pendingAugmentRerollSlot = -1;
  }
  currentHeroAugmentRound = next;
  if (defer) return;
  save();
  render();
}
function normalizeStage(value) {
  return STAGE_CHOICES.includes(value) ? value : "unknown";
}
function setStage(value, defer) {
  currentStage = normalizeStage(value);
  if (defer) return;
  save();
  render();
}
function normalizeGold(value) {
  if (value === "unknown" || value == null || value === "") return "unknown";
  const gold = Math.max(0, Number(value) || 0);
  return String(Math.min(50, Math.floor(gold / 10) * 10));
}
function setGold(value, defer) {
  currentGold = normalizeGold(value);
  if (defer) return;
  save();
  render();
}
function normalizeHealth(value) {
  if (value === "unknown" || value == null || value === "") return "unknown";
  const health = Number(value);
  if (!Number.isFinite(health)) return "unknown";
  return String(Math.max(1, Math.min(100, Math.round(health))));
}
function setHealth(value, defer) {
  currentHealth = normalizeHealth(value);
  if (defer) return;
  save();
  render();
}
function signalKey(s) {
  if (s.kind === "units") return `units|${s.value}`;
  if (s.kind === "items") return `items|${s.value}|${s.holder || ""}`;
  return `${s.kind}|${s.value}`;
}
function unitSignalLabel(value, star, location) {
  const details = [];
  if (star) details.push(`${star}星`);
  if (location === "board") details.push("场上");
  if (location === "bench") details.push("备战席");
  return [value, ...details].join("·");
}
function itemSignalLabel(row) {
  const count = Math.max(1, Number(row.count) || 1);
  return `${row.holder ? `${row.holder}带` : ""}${row.value}${count > 1 ? `×${count}` : ""}`;
}
function normalizeSignal(s) {
  const value = s && (s.value || s.name || s.label);
  const star = Number(s && s.star) || 0;
  const location = s && ["board", "bench"].includes(s.location) ? s.location : undefined;
  const count = s && s.kind === "items"
    ? Math.max(1, Math.min(9, Math.round(Number(s.count) || 1)))
    : s && s.kind === "traits" ? Math.max(0, Math.round(Number(s.count) || 0)) : s && s.count;
  return {
    kind: s && s.kind,
    value,
    label: s && s.kind === "units" ? unitSignalLabel(value, star, location) : (s && s.label || value),
    count,
    star: star || undefined,
    holder: s && s.holder,
    equipped: Boolean(s && (s.equipped || s.holder)),
    location,
    commitmentType: s && s.commitmentType,
    targetUnit: s && s.targetUnit,
    gold: s && s.gold,
    via: s && s.via,
  };
}
function manualLockAcceptsHeroAugment(name) {
  if (!manualLockId) return true;
  const template = STAGE2_MATCHER.templates.find(row => (row.id || row.name) === manualLockId);
  if (!template) return false;
  const required = new Set([
    ...((template.heroAugmentPlan && template.heroAugmentPlan.requiredNames) || []),
    ...(template.mechanic && template.mechanic.requiredAugment ? [template.mechanic.requiredAugment] : []),
  ]);
  return !required.size || required.has(name);
}
function consumeUnassignedItem(value, count) {
  let remaining = Math.max(0, Number(count) || 0);
  for (let i = signals.length - 1; i >= 0 && remaining > 0; i--) {
    const row = signals[i];
    if (row.kind !== "items" || row.value !== value || row.holder) continue;
    const available = Math.max(1, Number(row.count) || 1);
    const moved = Math.min(available, remaining);
    const left = available - moved;
    if (left > 0) {
      row.count = left;
      row.label = itemSignalLabel(row);
    } else {
      signals.splice(i, 1);
    }
    remaining -= moved;
  }
  return remaining;
}
function addSignal(s, defer) {
  if (!s || !s.kind) return;
  if (s.kind === "levels") {
    setLevel(Number(s.level || s.value), defer);
    return;
  }
  if (s.kind === "heroRounds") {
    setHeroAugmentRound(s.round || s.value, defer);
    return;
  }
  if (s.kind === "stage") {
    setStage(s.value, defer);
    return;
  }
  if (s.kind === "gold") {
    setGold(s.value, defer);
    return;
  }
  const next = normalizeSignal(s);
  if (!next.value) return;
  if (next.kind === "augments" && HERO_AUGMENT_NAMES.has(next.value)) {
    const previous = signals.filter(row => row.kind === "augments" && HERO_AUGMENT_NAMES.has(row.value));
    const changed = previous.some(row => row.value !== next.value);
    signals = signals.filter(row => row.kind !== "augments" || !HERO_AUGMENT_NAMES.has(row.value));
    signals.push(next);
    if (heroAugmentOffer) heroAugmentOffer.status = "selected";
    augChoices = null;
    if (changed && !manualLockAcceptsHeroAugment(next.value)) manualLockId = "";
    if (!defer) save();
    return;
  }
  const existingIndex = signals.findIndex(x => signalKey(x) === signalKey(next));
  const existing = signals[existingIndex];
  if (existing) {
    if (next.kind === "units" && (next.star || next.location)) {
      const merged = {
        ...existing,
        ...next,
        star: next.star || existing.star,
        location: next.location || existing.location,
        via: next.via || existing.via,
      };
      merged.label = unitSignalLabel(merged.value, merged.star, merged.location);
      signals[existingIndex] = merged;
    } else if (next.kind === "units") {
      existing.via = next.via || existing.via;
    } else if (next.kind === "items") {
      if (next.holder) {
        const desired = Math.max(Number(existing.count) || 1, Number(next.count) || 1);
        consumeUnassignedItem(next.value, desired - (Number(existing.count) || 1));
        existing.count = desired;
      } else {
        existing.count = Math.min(9, (Number(existing.count) || 1) + (Number(next.count) || 1));
      }
      existing.equipped = next.equipped || existing.equipped;
      existing.via = next.via || existing.via;
      existing.label = itemSignalLabel(existing);
    } else if (next.kind === "traits") {
      existing.count = next.count;
      existing.label = next.count ? `${next.count}${next.value}` : (next.label || next.value);
      existing.via = next.via || existing.via;
    } else if (next.via === "llm") {
      existing.via = "llm";
    }
  } else {
    if (next.kind === "items") {
      if (next.holder) consumeUnassignedItem(next.value, Number(next.count) || 1);
      next.label = itemSignalLabel(next);
    }
    if (next.kind === "traits" && next.count) next.label = `${next.count}${next.value}`;
    signals.push(next);
  }
  if (!defer) save();
}
function removeSignal(s, defer) {
  signals = signals.filter(x => signalKey(x) !== signalKey(s));
  if (!defer) save();
}
function removeByValue(value) {
  signals = signals.filter(s => s.value !== value && s.label !== value);
  save();
}
function readMatchLog() {
  try { return JSON.parse(localStorage.getItem(MATCH_LOG_KEY) || "[]"); } catch (e) { return []; }
}
function writeMatchLog(rows) {
  localStorage.setItem(MATCH_LOG_KEY, JSON.stringify(rows || []));
}
function readMatchHistory() {
  try { return JSON.parse(localStorage.getItem(MATCH_LOG_HISTORY_KEY) || "[]"); } catch (e) { return []; }
}
function writeMatchHistory(rows) {
  localStorage.setItem(MATCH_LOG_HISTORY_KEY, JSON.stringify((rows || []).slice(0, 10)));
}
function archiveMatchLog() {
  const rows = readMatchLog();

  box.setAttribute("role", "button");
  box.setAttribute("aria-label", `查看 ${t.name} 前中后期阵容`);
}
function augOptionInfo(sig) {
  const name = sig.value;
  const routeHits = STAGE2_MATCHER.templates.filter(t => (t.augmentPrefs || []).includes(name));
  const option = ((STAGE2_MATCHER.options.augmentSearch || STAGE2_MATCHER.options.augments) || []).find(x => x.name === name) || {};
  return { name, option, routeHits: routeHits.length, marginal: null };
}
function renderAugTriple() {
  $("routeView").classList.add("hidden");
  $("augView").classList.remove("hidden");
  const offerActive = heroAugmentOffer && heroAugmentOffer.status === "offered";
  const displaySlots = offerActive
    ? heroAugmentOffer.slots
    : (augChoices || []).map((row, slot) => ({ slot, name: row.value, seen: [row.value], rerollsRemaining: 0, waiting: false }));
  const rawRows = displaySlots.filter(slot => slot.name).map(slot => ({ ...augOptionInfo({ value: slot.name }), slot: slot.slot }));
  const decisionSignals = [
    ...signals,
    ...(currentStage !== "unknown" ? [{ kind: "stage", value: currentStage }] : []),
    ...(currentGold !== "unknown" ? [{ kind: "gold", value: Number(currentGold) }] : []),
  ];
  const comparison = AugmentAdvisor.buildComparison(rawRows, decisionSignals, {
    // 三张符文尚未进入同随机种子的有/无符文反事实模拟，因此只展示弱证据，不参与首推。
    counterfactualValidated: false,
    minGap: 2,
  });
  const rows = comparison.rows;
  const rowByName = new Map(rows.map(row => [row.name, row]));
  const status = comparison.missing.length
    ? `信息不足，暂不可靠排序。还需补充：${comparison.missing.join("、")}。`
    : "当前只有路线匹配弱证据，尚无符文反事实模拟，因此暂不强行首推。";
  $("augView").innerHTML = `
    <div>
      <div class="routeName">符文三选一</div>
      <div class="subRank">先比较符文对当前局面的边际价值；点击选定后才会正式加入信号池。${offerActive ? "单栏重随会立即更新后续路线概率。" : ""}</div>
      <div class="augStatus">${esc(status)}</div>
    </div>
    <div class="augCards">${displaySlots.map(slot => {
      const r = rowByName.get(slot.name);
      if (!r) return `<div class="augCard"><div class="augSlotMeta"><span>第${slot.slot + 1}栏</span><span>剩余${slot.rerollsRemaining}次</span></div><div class="augWaiting">等待输入重随结果</div></div>`;
      return `<div class="augCard ${comparison.recommended === r.name ? "best" : ""}">
        <div class="augSlotMeta"><span>第${slot.slot + 1}栏</span>${offerActive ? `<span>单栏重随剩余${slot.rerollsRemaining}次</span>` : ""}</div>
        <button class="augSelect" data-name="${esc(r.name)}">
          <div class="augName">${esc(r.name)}</div>
          <div class="augMechanic">机制：${esc(r.effect)}</div>
          <div class="augVerdict">适合：${esc(r.fit)}</div>
          ${r.missingLabels.length ? `<div class="augMissing">待补：${esc(r.missingLabels.join("、"))}</div>` : ""}
          <div class="augEvidence">命中${r.routeHits}条路线偏好（仅为覆盖统计，不代表优劣，不参与排序）</div>
        </button>
        ${offerActive ? `<button class="augReroll" data-reroll="${slot.slot}" ${slot.rerollsRemaining <= 0 ? "disabled" : ""}>重随第${slot.slot + 1}栏</button>` : ""}
      </div>`;
    }).join("")}</div>
    <div></div>
    ${unheardHtml()}
  `;
  $("augView").querySelectorAll(".augSelect").forEach(btn => btn.addEventListener("click", () => {
    addSignal({ kind: "augments", value: btn.dataset.name, label: btn.dataset.name });
    augChoices = null;
    pendingAugmentRerollSlot = -1;
    save();
    render();
  }));
  $("augView").querySelectorAll("[data-reroll]").forEach(btn => btn.addEventListener("click", () => {
    const index = Number(btn.dataset.reroll);
    const slot = heroAugmentOffer && heroAugmentOffer.slots[index];
    if (!slot || slot.rerollsRemaining <= 0) return;
    slot.rerollsRemaining -= 1;
    slot.name = "";
    slot.waiting = true;
    pendingAugmentRerollSlot = index;
    augChoices = heroAugmentOffer.slots.filter(row => row.name).map(row => ({ kind: "augments", value: row.name, label: row.name }));
    $("voiceInput").placeholder = `输入重随后第${index + 1}栏的英雄强化`;
    save();
    render();
    focusInput();
  }));
}
function renderLog() {
  const body = $("logBody");
  if (!body) return;
  const rows = readMatchLog();
  const history = readMatchHistory();
  body.innerHTML = rows.length ? rows.slice().reverse().map(r => `
    <div class="logEntry">
      <div class="logMeta">${esc(r.time || "-")} ｜ #1 ${esc(r.top || "-")}</div>
      <div class="logRaw">${esc(r.raw || "-")}</div>
      <div>快车道：${esc(r.fast || "-")}</div>
      <div>AI车道：${esc(r.ai || "-")}</div>
    </div>
  `).join("") : `<div class="logEntry"><div class="logRaw">本局还没有沟通记录</div><div class="logMeta">已归档 ${history.length} 局历史，新的一局会清空当前记录。</div></div>`;
}
function render() {
  renderLevel();
  renderDecisionState();
  renderHeroAugmentRound();
  renderSignals();
  renderPending();
  if (augChoices && augChoices.length) renderAugTriple();
  else renderRoute();
  renderLog();
}

$("voiceInput").addEventListener("compositionstart", () => { isComposing = true; });
$("voiceInput").addEventListener("compositionend", () => { isComposing = false; });
$("voiceInput").addEventListener("keydown", ev => {
  if (ev.key !== "Enter" || ev.isComposing || isComposing) return;
  ev.preventDefault();
  parseInput();
  focusInput();
});
$("submitInput").addEventListener("click", () => {
  if (isComposing) return;
  parseInput();
  focusInput();
});
$("routeView").addEventListener("click", ev => {
  if (ev.target.closest("button,a,input,textarea,select,details,summary")) return;
  openRouteDetail(lastDetailRow);
});
$("routeView").addEventListener("keydown", ev => {
  if (ev.key !== "Enter" && ev.key !== " ") return;
  if (ev.target.closest("button,a,input,textarea,select,details,summary")) return;
  ev.preventDefault();
  openRouteDetail(lastDetailRow);
});
$("routeDialog").addEventListener("click", ev => {
  if (ev.target === $("routeDialog")) $("routeDialog").close();
});
$("newGame").addEventListener("click", clearGame);
$("themeBtn").addEventListener("click", () => {
  const cur = document.documentElement.dataset.theme || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  const next = cur === "dark" ? "light" : "dark";
  document.documentElement.dataset.theme = next;
  localStorage.setItem(LS + "theme", next);
  focusInput();
});
$("settingsBtn").addEventListener("click", () => {
  fillSettingsPanel();
  $("settingsPanel").classList.toggle("hidden");
  $("llmTestState").textContent = "";
});
$("logBtn").addEventListener("click", () => {
  renderLog();
  $("logPanel").classList.toggle("hidden");
  focusInput();
});
$("logClose").addEventListener("click", () => {
  $("logPanel").classList.add("hidden");
  focusInput();
});
$("settingsClose").addEventListener("click", () => {
  saveSettingsPanel();
  $("settingsPanel").classList.add("hidden");
  focusInput();
});
["llmApiBase", "llmKey", "llmModel"].forEach(id => $(id).addEventListener("change", saveSettingsPanel));
$("llmTest").addEventListener("click", async () => {
  saveSettingsPanel();
  $("llmTestState").textContent = "测试中...";
  setLlmStatus("work");
  const res = await LLMLane.testConnection({ ...llmSettings(), matcher: STAGE2_MATCHER });
  $("llmTestState").textContent = connectionStatusText(res);
  setLlmStatus(res.ok ? "ok" : "fail");
});
$("llmExport").addEventListener("click", () => {
  downloadText("jcc-match-unheard-log.json", JSON.stringify(readUnheardLog(), null, 2));
});
$("llmClearLog").addEventListener("click", () => {
  writeUnheardLog([]);
  $("llmTestState").textContent = "日志已清空";
});

load();
render();
focusInput();
</script>
</body>
</html>
