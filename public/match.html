<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>比赛模式 · 金铲铲 S18</title>
<style>
:root {
  --plane:#f9f9f7; --surface:#fcfcfb; --ink:#0b0b0b; --ink2:#52514e; --muted:#898781;
  --grid:#e1e0d9; --border:rgba(11,11,11,.12);
  --s1:#2a78d6; --s2:#1baf7a; --s3:#eda100; --s5:#4a3aa7; --s6:#e34948;
}
:root[data-theme="dark"] {
  --plane:#0d0d0d; --surface:#1a1a19; --ink:#fff; --ink2:#c3c2b7; --muted:#898781;
  --grid:#2c2c2a; --border:rgba(255,255,255,.12);
  --s1:#3987e5; --s2:#199e70; --s3:#c98500; --s5:#9085e9; --s6:#e66767;
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --plane:#0d0d0d; --surface:#1a1a19; --ink:#fff; --ink2:#c3c2b7; --muted:#898781;
    --grid:#2c2c2a; --border:rgba(255,255,255,.12);
    --s1:#3987e5; --s2:#199e70; --s3:#c98500; --s5:#9085e9; --s6:#e66767;
  }
}
* { box-sizing:border-box; margin:0; }
html, body { height:100%; overflow:hidden; }
body { background:var(--plane); color:var(--ink); font:18px/1.45 system-ui,-apple-system,"Segoe UI",sans-serif; }
button, input { font:inherit; }
.app { height:100vh; display:grid; grid-template-rows:auto auto 1fr; gap:12px; padding:16px; max-width:1280px; margin:0 auto; }
.top { display:grid; grid-template-columns:minmax(0,1fr) auto auto auto auto auto auto; gap:10px; align-items:center; }
.voice { height:62px; border:2px solid var(--s2); border-radius:12px; background:var(--surface); color:var(--ink); padding:0 18px; font-size:24px; outline:none; }
.bigBtn { min-height:58px; border:1px solid var(--border); border-radius:12px; background:var(--surface); color:var(--ink); padding:0 18px; cursor:pointer; font-weight:800; }
.new { background:var(--s6); color:#fff; border-color:var(--s6); }
.theme { color:var(--ink2); }
.settingsBtn { width:58px; padding:0; font-size:25px; }
.llmDot { width:14px; height:14px; border-radius:50%; background:var(--muted); justify-self:center; box-shadow:0 0 0 4px color-mix(in srgb, var(--muted) 15%, transparent); }
.llmDot.work { background:var(--s3); box-shadow:0 0 0 4px color-mix(in srgb, var(--s3) 22%, transparent); }
.llmDot.ok { background:var(--s2); box-shadow:0 0 0 4px color-mix(in srgb, var(--s2) 22%, transparent); }
.llmDot.fail { background:var(--muted); }
.aiMark { display:inline-grid; place-items:center; min-width:24px; height:20px; margin-left:6px; border-radius:999px; background:var(--s5); color:#fff; font-size:12px; font-weight:950; vertical-align:middle; }
.banner { position:fixed; left:50%; top:16px; transform:translateX(-50%); z-index:5; background:var(--s2); color:#fff;
  padding:10px 18px; border-radius:999px; font-weight:900; box-shadow:0 10px 30px rgba(0,0,0,.24); opacity:0; pointer-events:none; transition:opacity .18s; }
.banner.show { opacity:1; }
.status { display:grid; grid-template-columns:1fr; gap:8px; min-height:94px; }
.pending, .signals { display:flex; gap:8px; flex-wrap:wrap; align-items:center; min-height:42px; }
.levelRow, .heroAugRow { display:flex; gap:8px; flex-wrap:wrap; align-items:center; min-height:38px; }
.label { color:var(--muted); font-size:15px; font-weight:800; margin-right:2px; }
.chip, .candidate { min-height:44px; border:1px solid var(--border); border-radius:999px; background:var(--surface); color:var(--ink); padding:6px 14px; cursor:pointer; font-size:18px; }
.chip { border-color:color-mix(in srgb, var(--s2) 55%, var(--border)); }
.levelChip { min-height:36px; border:1px solid var(--border); border-radius:999px; background:var(--plane); color:var(--ink2); padding:4px 11px; cursor:pointer; font-size:16px; font-weight:850; }
.levelChip.on { background:var(--s2); border-color:var(--s2); color:#fff; }
.heroAugChip { min-height:36px; border:1px solid var(--border); border-radius:999px; background:var(--plane); color:var(--ink2); padding:4px 13px; cursor:pointer; font-size:16px; font-weight:850; }
.heroAugChip.on { background:var(--s5); border-color:var(--s5); color:#fff; }
.heroAugHint { color:var(--muted); font-size:14px; font-weight:750; }
.candidate { border-color:color-mix(in srgb, var(--s3) 65%, var(--border)); }
.drop { min-width:44px; padding:6px 12px; color:var(--s6); }
.main { min-height:0; display:grid; grid-template-columns:minmax(0,1fr); }
.routeView, .augView { position:relative; min-width:0; min-height:0; overflow:hidden; border:1px solid var(--border); border-radius:16px; background:var(--surface); padding:16px 20px; display:grid; grid-template-rows:auto auto 1fr; gap:8px; }
.routeView.clickable { cursor:pointer; }
.routeView.clickable:focus-visible { outline:3px solid color-mix(in srgb, var(--s2) 70%, transparent); outline-offset:3px; }
.rankTop { display:grid; grid-template-columns:minmax(0,1fr) auto; gap:12px; align-items:start; }
.routeName { font-size:32px; font-weight:950; line-height:1.18; overflow-wrap:anywhere; }
.routePoints { font-size:34px; font-weight:950; color:var(--s2); white-space:nowrap; }
.subRank { color:var(--ink2); font-size:17px; overflow-wrap:anywhere; }
.strengthBreak, .stickyNote { color:var(--ink2); font-size:16px; overflow-wrap:anywhere; margin-top:4px; }
.stickyNote { color:var(--muted); }
.evidenceLine { color:var(--ink2); font-size:15px; overflow-wrap:anywhere; margin-top:4px; }
.gateStrip { margin-top:8px; padding:9px 11px; border-radius:10px; border:1px solid var(--border); font-size:17px; font-weight:900; overflow-wrap:anywhere; }
.gateStrip.green { color:#fff; background:var(--s2); border-color:var(--s2); }
.gateStrip.yellow { color:#1f1800; background:color-mix(in srgb, var(--s3) 70%, #fff 30%); border-color:var(--s3); }
.gateStrip.red { color:#fff; background:var(--s6); border-color:var(--s6); }
.formulaLine { color:var(--muted); font-size:14px; margin-top:4px; overflow-wrap:anywhere; }
.sampleStrip { margin-top:5px; padding:5px 9px; border-radius:10px; border:1px solid color-mix(in srgb, var(--s5) 45%, var(--border)); color:var(--ink2); background:color-mix(in srgb, var(--surface) 90%, var(--s5) 10%); font-size:15px; overflow-wrap:anywhere; }
.heroAugStrip { margin-top:6px; padding:7px 10px; border-radius:10px; border:1px solid var(--border); font-size:16px; font-weight:900; overflow-wrap:anywhere; }
.heroAugStrip.locked, .heroAugStrip.lock { color:#fff; background:var(--s2); border-color:var(--s2); }
.heroAugStrip.waiting, .heroAugStrip.available { color:#1f1800; background:color-mix(in srgb, var(--s3) 70%, #fff 30%); border-color:var(--s3); }
.heroAugStrip.base-only { color:var(--ink2); background:color-mix(in srgb, var(--surface) 82%, var(--muted) 18%); }
.heroAugStrip.closed { color:#fff; background:var(--s6); border-color:var(--s6); }
.followBadge { display:inline-grid; place-items:center; margin-left:8px; padding:2px 8px; border-radius:999px; background:var(--s2); color:#fff; font-size:14px; font-weight:950; vertical-align:middle; }
.followStrip { margin-top:6px; padding:7px 10px; border-radius:10px; border:1px solid color-mix(in srgb, var(--s2) 45%, var(--border)); color:var(--ink2); background:color-mix(in srgb, var(--surface) 88%, var(--s2) 12%); font-size:15px; overflow-wrap:anywhere; }
.reachBox { color:var(--ink2); font-size:16px; line-height:1.45; margin-top:4px; overflow-wrap:anywhere; }
.reachToggle { margin-left:8px; border:0; background:transparent; color:var(--s2); cursor:pointer; font-weight:900; padding:0; }
.openHint { color:var(--s2); font-size:15px; font-weight:900; margin-top:4px; }
.actions { display:grid; gap:10px; align-content:start; margin-top:6px; }
.action { min-height:50px; border-left:5px solid var(--s2); background:color-mix(in srgb, var(--surface) 88%, var(--s2) 12%);
  border-radius:10px; padding:10px 14px; font-size:22px; font-weight:850; }
.meta { display:flex; flex-wrap:wrap; gap:10px; margin-top:8px; min-width:0; }
.metric { border:1px solid var(--grid); border-radius:10px; padding:9px 11px; min-width:0; }
.metric { flex:1 1 180px; }
.metric .lb { color:var(--muted); font-size:14px; display:flex; justify-content:space-between; gap:8px; min-width:0; }
.metric .lb span { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.metric .bar { height:7px; border-radius:999px; background:color-mix(in srgb, var(--s2) 14%, transparent); overflow:hidden; margin-top:6px; }
.metric .bar i { display:block; height:100%; border-radius:999px; background:var(--s2); }
.metric.item .bar i { background:var(--s1); }
.metric.aug .bar i { background:var(--s3); }
.metric.trait .bar i { background:var(--s5); }
.unheardLine { position:absolute; left:20px; right:20px; bottom:10px; color:var(--muted); font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; pointer-events:none; }
.augCards { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:14px; min-height:0; }
.augCard { border:2px solid var(--border); border-radius:16px; background:var(--surface); padding:18px; cursor:pointer; display:grid; gap:10px; align-content:start; }
.augCard.best { border-color:var(--s2); background:color-mix(in srgb, var(--surface) 88%, var(--s2) 12%); }
.augName { font-size:28px; font-weight:950; }
.augVerdict { font-size:21px; color:var(--ink2); }
.augScore { font-size:28px; font-weight:950; color:var(--s2); }
.augSample { color:var(--s5); font-size:15px; font-weight:850; }
.empty { height:100%; display:grid; place-items:center; color:var(--muted); font-size:24px; text-align:center; padding:20px; }
.settingsPanel { position:fixed; right:16px; top:88px; z-index:8; width:min(520px, calc(100vw - 32px)); border:1px solid var(--border); border-radius:16px; background:var(--surface); box-shadow:0 18px 46px rgba(0,0,0,.28); padding:18px; display:grid; gap:12px; }
.settingsPanel h2 { font-size:24px; line-height:1.2; }
.settingsPanel label { display:grid; gap:6px; color:var(--ink2); font-size:15px; font-weight:800; }
.settingsPanel input { height:44px; border:1px solid var(--border); border-radius:10px; background:var(--plane); color:var(--ink); padding:0 12px; font-size:16px; outline:none; }
.settingsActions { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
.smallBtn { min-height:42px; border:1px solid var(--border); border-radius:10px; background:var(--plane); color:var(--ink); padding:0 12px; cursor:pointer; font-weight:850; }
.testState { color:var(--muted); font-size:14px; font-weight:800; }
.logPanel { position:fixed; right:16px; bottom:16px; z-index:7; width:min(660px, calc(100vw - 32px)); max-height:56vh; border:1px solid var(--border); border-radius:16px; background:var(--surface); box-shadow:0 18px 46px rgba(0,0,0,.25); overflow:hidden; }
.logHead { min-height:48px; display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 14px; border-bottom:1px solid var(--border); font-weight:950; }
.logBody { max-height:calc(56vh - 48px); overflow:auto; padding:10px 14px; display:grid; gap:8px; font-size:14px; color:var(--ink2); }
.logEntry { border:1px solid var(--grid); border-radius:10px; padding:8px 10px; display:grid; gap:3px; }
.logRaw { color:var(--ink); font-weight:850; }
.logMeta { color:var(--muted); }
dialog { border:1px solid var(--border); border-radius:16px; background:var(--surface); color:var(--ink);
  width:min(860px,94vw); max-height:88vh; padding:22px 24px; margin:auto; overflow:auto; box-shadow:0 20px 56px rgba(0,0,0,.34); }
dialog::backdrop { background:rgba(0,0,0,.55); }
.detailHead { display:flex; align-items:flex-start; gap:10px; margin-bottom:8px; }
.detailHead h2 { flex:1; font-size:24px; line-height:1.25; }
.detailBadge { flex:0 0 auto; font-weight:900; font-size:13px; border-radius:8px; padding:3px 10px; color:#fff; background:var(--s2); }
.detailMeta { color:var(--ink2); font-size:15px; margin-bottom:12px; }
.closeX { background:none; border:0; color:var(--muted); font-size:26px; cursor:pointer; line-height:1; padding:0 6px; }
.detailSection { font-size:15px; color:var(--muted); font-weight:900; margin:16px 0 7px; }
.detailLine { color:var(--ink2); font-size:16px; line-height:1.55; margin-bottom:6px; overflow-wrap:anywhere; }
.detailLine b { color:var(--ink); font-weight:900; }
.stageGrid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; }
.stageBox { border:1px solid var(--grid); border-radius:12px; padding:11px 12px; background:color-mix(in srgb, var(--surface) 92%, var(--s2) 8%); min-width:0; }
.stageTitle { color:var(--muted); font-size:14px; font-weight:900; margin-bottom:6px; }
.stageUnits { color:var(--ink); font-size:17px; font-weight:850; line-height:1.55; overflow-wrap:anywhere; }
.board { display:flex; flex-direction:column; gap:5px; margin:10px 0 4px; overflow-x:auto; padding-bottom:4px; }
.brow { display:flex; gap:5px; }
.brow.off { margin-left:46px; }
.cell { flex:0 0 86px; min-height:78px; border:1px solid var(--grid); border-radius:8px; padding:5px 6px; font-size:11px; background:var(--plane); }
.cell.empty { border-style:dashed; opacity:.42; }
.cell.carry { box-shadow:inset 0 0 0 2px var(--s2); }
.cell .cn { font-weight:900; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.cell .cost { color:var(--muted); font-size:10.5px; }
.cell .it { color:var(--ink2); font-size:10.5px; line-height:1.35; }
.hidden { display:none !important; }
@media (max-width: 900px) {
  .app { padding:10px; }
  .top { grid-template-columns:1fr; }
  .voice { font-size:21px; }
  .rankTop, .augCards { grid-template-columns:1fr; }
  .routeName { font-size:28px; }
  .stageGrid { grid-template-columns:1fr; }
}
</style>

<div class="banner" id="switchBanner"></div>
<div class="app">
  <div class="top">
    <input id="voiceInput" class="voice" autofocus placeholder="直接说：来了个安妮还有波比拿了养刀">
    <button id="newGame" class="bigBtn new">新的一局</button>

    <button id="logBtn" class="bigBtn theme">记录</button>

<script>
"use strict";
const LS = "jcc-match-";
const LLM_LS = "jcc-match-llm-";
const UNHEARD_LOG_KEY = "jcc-match-unheard-log";
const MATCH_LOG_KEY = "jcc-match-log";
const MATCH_LOG_HISTORY_KEY = "jcc-match-log-history";
const $ = id => document.getElementById(id);
const esc = MatcherCore.escText;
const UNIT_PRICES = Object.fromEntries((STAGE2_MATCHER.options.unitSearch || []).map(x => [x.name, x.price]));
const UNIT_TRAITS = Object.fromEntries((STAGE2_MATCHER.options.unitSearch || []).map(x => [x.name, x.traits || []]));
const DEFAULT_LEVEL = MatcherCore.DEFAULT_LEVEL || 6;
const MIN_LEVEL = MatcherCore.MIN_LEVEL || 1;
const MAX_LEVEL = MatcherCore.MAX_LEVEL || 9;
const LEVEL_CHOICES = Array.from({ length: MAX_LEVEL - MIN_LEVEL + 1 }, (_, i) => MIN_LEVEL + i);
const HERO_AUGMENT_CHOICES = ["unknown", "2-1", "3-2", "4-2"];
const savedTheme = localStorage.getItem(LS + "theme");
if (savedTheme) document.documentElement.dataset.theme = savedTheme;

let signals = [];
let currentLevel = normalizeLevel(localStorage.getItem(LS + "level"));
let currentHeroAugmentRound = normalizeHeroAugmentRound(localStorage.getItem(LS + "hero-augment-round"));
let pending = [];
let unheard = [];
let augChoices = null;
let inputTimer = null;
let lastTop = "";
let lastTopId = "";
let previousOrder = [];
let lastRenderedTop = null;
let lastDetailRow = null;
let expandedReachId = "";
let bannerTimer = null;
let llmSeq = 0;

function load() {
  try { signals = JSON.parse(localStorage.getItem(LS + "signals") || "[]"); } catch (e) { signals = []; }
}
function save() {
  localStorage.setItem(LS + "signals", JSON.stringify(signals));
  localStorage.setItem(LS + "level", String(currentLevel));
  localStorage.setItem(LS + "hero-augment-round", currentHeroAugmentRound);
}
function normalizeLevel(level) {
  return Math.max(MIN_LEVEL, Math.min(MAX_LEVEL, Number(level) || DEFAULT_LEVEL));
}
function setLevel(level) {
  const n = normalizeLevel(level);
  currentLevel = n;
  save();
  render();
}
function normalizeHeroAugmentRound(value) {
  return MatcherCore.normalizeHeroAugmentRound ? MatcherCore.normalizeHeroAugmentRound(value) : (HERO_AUGMENT_CHOICES.includes(value) ? value : "unknown");
}
function setHeroAugmentRound(round) {
  currentHeroAugmentRound = normalizeHeroAugmentRound(round);
  save();
  previousOrder = [];
  lastTop = "";
  lastTopId = "";
  render();
}
function signalKey(s) {
  if (s.kind === "units") return `units|${s.value}`;
  return `${s.kind}|${s.value}|${s.kind === "traits" ? (s.count || "") : ""}`;
}
function normalizeSignal(s) {
  const value = s && (s.value || s.name || s.label);
  const star = Number(s && s.star) || 0;
  return {
    kind: s && s.kind,
    value,
    label: s && s.kind === "units" && star ? `${value}·${star}星` : (s && s.label || value),
    count: s && s.count,
    star: star || undefined,
    via: s && s.via,
  };
}
function addSignal(s) {
  if (!s || !s.kind) return;
  if (s.kind === "levels") {
    setLevel(Number(s.level || s.value));
    return;
  }
  const next = normalizeSignal(s);
  if (!next.value) return;
  const existing = signals.find(x => signalKey(x) === signalKey(next));
  if (existing) {
    if (next.kind === "units" && Number(next.star || 0) > Number(existing.star || 0)) {
      existing.star = next.star;
      existing.label = next.label;
      existing.via = next.via || existing.via;
    } else if (next.via === "llm") {
      existing.via = "llm";
    }
  } else {
    signals.push(next);
  }
  save();
}
function removeSignal(s) {
  signals = signals.filter(x => signalKey(x) !== signalKey(s));
  save();
}
function removeByValue(value) {
  signals = signals.filter(s => s.value !== value && s.label !== value);
  save();
}
function readMatchLog() {
  try { return JSON.parse(localStorage.getItem(MATCH_LOG_KEY) || "[]"); } catch (e) { return []; }
}
function writeMatchLog(rows) {
  localStorage.setItem(MATCH_LOG_KEY, JSON.stringify(rows || []));
}
function readMatchHistory() {
  try { return JSON.parse(localStorage.getItem(MATCH_LOG_HISTORY_KEY) || "[]"); } catch (e) { return []; }
}
function writeMatchHistory(rows) {
  localStorage.setItem(MATCH_LOG_HISTORY_KEY, JSON.stringify((rows || []).slice(0, 10)));
}
function archiveMatchLog() {
  const rows = readMatchLog();
  if (!rows.length) return;
  const history = readMatchHistory();
  history.unshift({ time: new Date().toISOString(), rows });
  writeMatchHistory(history);
  writeMatchLog([]);
}
function signalText(rows) {
  return (rows || []).map(s => {
    if (!s) return "";
    if (s.kind === "traits") return `${s.count}${s.value}`;
    if (s.kind === "levels") return `等级${s.level || s.value}`;
    if (s.kind === "units" && s.star) return `${s.value}·${s.star}星`;
    return s.value || s.label || "";
  }).filter(Boolean).join("、") || "-";
}
function compactParsed(parsed) {
  const rows = [];

async function triggerLlm(raw, rows, round) {

    ...settings,
    original: raw,
    unheard: rows,
    signals,
    matcher: STAGE2_MATCHER,
  });
  if (seq !== llmSeq) return;
  if (!result.ok) {
    setLlmStatus("fail");
    if (result.status !== "no-key") logUnheard(raw, rows, result.status);
    appendMatchLog(round || { raw, fast: "-", ai: "-" });
    return;
  }
  (result.remove || []).forEach(removeByValue);
  (result.add || []).forEach(addSignal);
  if (round) {
    const aiRows = [];
    if (result.add && result.add.length) aiRows.push(`加：${signalText(result.add)}`);
    if (result.remove && result.remove.length) aiRows.push(`删：${(result.remove || []).join("、")}`);

}

function inferBoard(t) {

  const units = uniqueRows([...(t.coreUnits || []), ...(t.midUnits || []), ...(t.earlyUnits || [])]).slice(0, 9);
  const occupied = new Set();
  const rows = [];
  const centerCols = [4, 3, 5, 2, 6, 1, 7];
  const put = (name, row, role, carry) => {
    const fallbackRows = row === 4 ? [4, 3, 2, 1] : row === 1 ? [1, 2, 3, 4] : [row, 2, 3, 1, 4];
    for (const r of fallbackRows) {
      for (const col of centerCols) {
        const key = `${r}-${col}`;
        if (occupied.has(key)) continue;
        occupied.add(key);
        const prof = profileUnit(t, name);
        const itemSeed = carry
          ? (profileMainCarryItems(t).length ? profileMainCarryItems(t) : (t.completedPrefs || []).slice(0, 3))
          : ((prof && prof.items) || []).slice(0, 3);
        rows.push({ name, row: r, col, role, carry, items: itemSeed });
        return;
      }
    }
  };
  const carries = units.filter(x => carrySet.has(x));
  const fronts = units.filter(x => !carrySet.has(x) && isFrontUnit(x));
  const backs = units.filter(x => !carrySet.has(x) && !isFrontUnit(x));
  carries.forEach(name => put(name, isMeleeCarry(name) ? 2 : 4, "主C", true));
  fronts.forEach(name => put(name, 1, "前排", false));
  backs.forEach(name => put(name, 4, "输出/功能", false));
  return rows;
}

  const costText = visible.length ? visible.join("、") + (folded ? ` 等${costItems.length}项` : "") : "当前可刷缺口已见，约0金";

  const lateVisible = expanded || lateRows.length <= 3 ? lateRows : lateRows.slice(0, 3);
  const late = lateRows.length ? `后期目标：${lateVisible.join("、")}${!expanded && lateRows.length > 3 ? ` 等${lateRows.length}项` : ""}` : "";
  const toggle = costItems.length > 3 || lateRows.length > 3 ? `<button class="reachToggle" data-reach="${esc(id)}">${expanded ? "收起" : "展开"}</button>` : "";
  return `<div class="reachBox">缺口：${esc(costText)}${toggle}${late ? `<br>${esc(late)}` : ""}</div>`;
}
function heroAugmentHtml(row) {
  const hero = row && row.heroAugment;
  if (!hero) return "";
  return `<div class="heroAugStrip ${esc(hero.status)}">${esc(hero.text)}</div>`;
}
function renderRoute() {
  $("augView").classList.add("hidden");
  $("routeView").classList.remove("hidden");
  const box = $("routeView");
  const ranked = rankedRoutes();
  if ((!signals.length && currentHeroAugmentRound === "unknown") || !ranked.length) {
    box.classList.remove("clickable");
    box.removeAttribute("tabindex");
    box.removeAttribute("role");
    box.innerHTML = `<div class="empty">说出这把看到的棋子、装备、符文。<br>例如：安妮波比养刀，或者符文无情连打DD街区团队建设。</div>${unheardHtml()}`;
    lastTop = "";
    lastTopId = "";
    lastRenderedTop = null;
    lastDetailRow = null;
    previousOrder = ranked.map(r => r.template.id || r.template.name);
    return;
  }
  const top = ranked[0], second = ranked[1], third = ranked[2], t = top.template;
  const topId = t.id || t.name;
  const topScore = rowScore(top);
  const secondScore = second ? rowScore(second) : 0;
  const thirdScore = third ? rowScore(third) : 0;
  const following = ranked.find(r => r.following);
  const nextFollow = following || top;
  if (lastTop && lastTop !== nextFollow.template.name) showBanner(`路线切换 ${lastTop} → ${nextFollow.template.name}`);
  lastTop = nextFollow.template.name;
  lastTopId = routeId(nextFollow);
  lastRenderedTop = { name: t.name, finalScore: topScore, sample: top.sampleDecision ? top.sampleDecision.decisionShare : null };
  lastDetailRow = top;
  const delta = Math.max(0, second ? topScore - secondScore : topScore);
  const actions = MatcherCore.actionLines(t, selectedObj(), top);
  const reach = top.reachability;
  const af = top.antiFragile;
  const breakLine = af
    ? `基础强度${top.stageStrength || 0}分 → 抗脆弱${top.preCertificationScore ?? topScore}分 → 样本先验${topScore}分`
    : `已握资产${top.heldValue || 0}分 + 概率折现${top.futureValue || 0}分 = ${topScore}分`;
  const evidenceLine = (top.evidence || []).slice(0, 3).join("；");
  const stickyLine = top.followAdvice || (following && routeId(following) !== topId ? `建议继续跟 ${following.template.name}（挑战者领先不足）` : "跟随：当前最高分路线");
  const followBadge = top.following ? `<span class="followBadge">跟随中</span>` : "";
  const followStrip = following && routeId(following) !== topId
    ? `<div class="followStrip"><span class="followBadge">跟随中</span> ${esc(following.template.name)} · ${rowScore(following)}分</div>`
    : "";
  const gateHtml = af
    ? `<div class="gateStrip ${esc(af.status)}">${esc(af.label)} · 核心度${af.readyPct}% · 瓶颈：${esc(af.bottleneckText)}</div><div class="formulaLine">${esc(af.formula)}</div>`
    : "";
  const sampleHtml = top.sampleDecision
    ? `<div class="sampleStrip">${esc(top.sampleDecision.evidenceLevel)} · ${top.sampleDecision.sampleSize}样本 · 稳健${top.sampleDecision.robustness}% · 当前决策支持${top.sampleDecision.decisionShare}% · 先验${top.sampleDecision.priorPoints >= 0 ? "+" : ""}${top.sampleDecision.priorPoints}分</div>`
    : "";
  box.innerHTML = `
    <div>
      <div class="rankTop">
        <div class="routeName">#1 ${esc(t.name)}${followBadge}</div>
        <div class="routePoints">${topScore}分</div>
      </div>
      <div class="subRank">领先#2 ${delta}分 ｜ #2 ${second ? esc(second.template.name) + " " + secondScore + "分" : "-"} ｜ #3 ${third ? esc(third.template.name) + " " + thirdScore + "分" : "-"}</div>
      <div class="openHint">点击查看前期 / 中期 / 后期阵容</div>
      ${heroAugmentHtml(top)}
      ${gateHtml}
      ${sampleHtml}
      <div class="strengthBreak">${esc(breakLine)}</div>
      ${evidenceLine ? `<div class="evidenceLine">证据：${esc(evidenceLine)}</div>` : ""}
      ${reachHtml(top)}
      <div class="stickyNote">${esc(stickyLine)}</div>
      ${followStrip}
      ${MatcherCore.signalTowerHtml(top).replaceAll("s2SignalTower", "meta").replaceAll("s2Signal", "metric")}
    </div>
    <div class="actions">${actions.map(x => `<div class="action">${esc(x)}</div>`).join("")}</div>
    <div></div>
    ${unheardHtml()}
  `;
  box.querySelectorAll("[data-reach]").forEach(btn => btn.addEventListener("click", () => {
    const id = btn.dataset.reach;
    expandedReachId = expandedReachId === id ? "" : id;
    render();
  }));
  box.classList.add("clickable");
  box.tabIndex = 0;
  box.setAttribute("role", "button");
  box.setAttribute("aria-label", `查看 ${t.name} 前中后期阵容`);
  previousOrder = ranked.map(r => r.template.id || r.template.name);
}
function augOptionInfo(sig) {
  const name = sig.value;
  const routeHits = STAGE2_MATCHER.templates.filter(t => (t.augmentPrefs || []).includes(name));
  const hot = (MODEL.augRank || []).find(a => a.name === name);
  const option = ((STAGE2_MATCHER.options.augmentSearch || STAGE2_MATCHER.options.augments) || []).find(x => x.name === name) || {};
  const hero = (option.cats || []).includes("英雄强化");
  const selected = selectedObj();
  selected.augments = [...new Set([...(selected.augments || []), name])];
  const ranked = MatcherCore.rank(STAGE2_MATCHER.templates, selected, STAGE2_MATCHER.weights, 3, {
    oddsData: window.JCC_ODDS,
    unitPrices: UNIT_PRICES,
    unitTraits: UNIT_TRAITS,
    antiFragile: currentLevel >= 4,
    certification: true,
  });
  const top = ranked[0];
  const current = rankedRoutes()[0];
  const gain = top && current ? rowScore(top) - rowScore(current) : 0;
  let verdict = top ? `选择后首推 ${top.template.name}，相对当前${gain >= 0 ? "+" : ""}${gain}分。` : "没有可执行路线。";
  const operator = top && top.augmentOperator;
  if (operator && operator.rows.length) {
    const categories = [...new Set(operator.rows.map(x => x.category))].join("+");
    const operatorGain = (operator.variableBonus || 0) + (operator.economyFutureBonus || 0);
    verdict += ` ${categories}算子重算${operatorGain ? `，认证边际额外+${operatorGain}分` : "可达性"}。`;
  }
  if (hero && top) verdict += " 英雄强化按机制硬门槛重算。";
  else if (routeHits.length) verdict += ` 命中${routeHits.length}条路线推荐位。`;
  else if (hot) verdict += ` 通用热度${hot.score || 0}分。`;
  return { name, routeHits, hot, hero, augScore: top ? rowScore(top) : 0, verdict, top, sample: top && top.sampleDecision };
}
function renderAugTriple() {
  $("routeView").classList.add("hidden");
  $("augView").classList.remove("hidden");
  const rows = (augChoices || []).map(augOptionInfo).sort((a, b) => b.augScore - a.augScore);
  $("augView").innerHTML = `
    <div>
      <div class="routeName">符文三选一</div>
      <div class="subRank">点击选择一张，加入信号池后自动回到路线。</div>
    </div>
    <div class="augCards">${rows.map((r, i) => `
      <button class="augCard ${i === 0 ? "best" : ""}" data-name="${esc(r.name)}">
        <div class="augName">${esc(r.name)}</div>
        <div class="augVerdict">${esc(r.verdict)}</div>
        ${r.sample ? `<div class="augSample">${esc(r.sample.evidenceLevel)} · 稳健${r.sample.robustness}% · 当前支持${r.sample.decisionShare}%</div>` : ""}
        <div class="augScore">${r.augScore}分</div>
      </button>`).join("")}</div>
    <div></div>
    ${unheardHtml()}
  `;
  $("augView").querySelectorAll(".augCard").forEach(btn => btn.addEventListener("click", () => {
    addSignal({ kind: "augments", value: btn.dataset.name, label: btn.dataset.name });
    augChoices = null;
    render();
  }));
}
function renderLog() {
  const body = $("logBody");
  if (!body) return;
  const rows = readMatchLog();
  const history = readMatchHistory();
  body.innerHTML = rows.length ? rows.slice().reverse().map(r => `
    <div class="logEntry">
      <div class="logMeta">${esc(r.time || "-")} ｜ #1 ${esc(r.top || "-")}</div>
      <div class="logRaw">${esc(r.raw || "-")}</div>
      <div>快车道：${esc(r.fast || "-")}</div>
      <div>AI车道：${esc(r.ai || "-")}</div>
    </div>
  `).join("") : `<div class="logEntry"><div class="logRaw">本局还没有沟通记录</div><div class="logMeta">已归档 ${history.length} 局历史，新的一局会清空当前记录。</div></div>`;
}
function render() {
  renderLevel();
  renderHeroAugmentRound();
  renderSignals();
  renderPending();
  if (augChoices && augChoices.length) renderAugTriple();
  else renderRoute();
  renderLog();
}
